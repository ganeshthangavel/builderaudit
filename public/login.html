<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/assets/logo/builderaudit-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/logo/apple-touch-180.png">
<title>Sign in — BuilderAudit</title>
<meta name="description" content="Sign in to BuilderAudit. Your audits and saved reports are right where you left them.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════════════
   BA3 SIGN-IN · Split-screen · Classroom palette
   Faithful port of /tmp/ba3-handoff/ba3/project/src/sign-in.jsx
   ════════════════════════════════════════════════════════════════ */
:root {
  --fill:    #FFD24D;
  --accent:  #5247B8;
  --surface: #FBF5E1;
  --ink:     #1B1A17;
  --line:    #1B1A17;
  --muted:   #5C5851;
  --bad:     #C0392B;
  --display: 'Archivo','Archivo Black',-apple-system,sans-serif;
  --body:    'IBM Plex Sans',-apple-system,sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  min-height: 100vh; background: var(--surface);
  font-family: var(--body); color: var(--ink); -webkit-font-smoothing: antialiased;
}

/* Split screen */
.si-grid {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
}

/* ── LEFT panel — yellow welcome + handshake illustration ── */
.si-left {
  background: var(--fill);
  padding: 36px 56px 0;
  position: relative;
  display: flex; flex-direction: column;
  border-right: 3px solid var(--line);
  overflow: hidden;
}
.si-top {
  display: flex; justify-content: space-between; align-items: center;
}
.brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.brand-mark-svg { flex-shrink: 0; }
.brand-name {
  font-family: var(--display); font-weight: 800; font-size: 20px;
  color: var(--ink); letter-spacing: -0.01em; line-height: 1;
  white-space: nowrap;
}
.back-home {
  font-family: var(--body); font-size: 13.5px; font-weight: 600;
  color: var(--ink); text-decoration: none;
  display: flex; align-items: center; gap: 6px;
}
.back-home:hover { text-decoration: underline; }

.si-welcome { margin-top: 56px; margin-bottom: 24px; max-width: 480px; }
.si-kicker {
  display: inline-block; padding: 6px 12px;
  background: var(--accent); color: #fff;
  border-radius: 999px; font-family: var(--body);
  font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; margin-bottom: 16px; white-space: nowrap;
}
.si-h1 {
  font-family: var(--display); font-weight: 900;
  font-size: 54px; line-height: 0.95; color: var(--ink);
  text-transform: uppercase; letter-spacing: -0.02em;
  margin: 0 0 18px;
}
.si-lead {
  font-family: var(--body); font-size: 17px;
  color: var(--muted); line-height: 1.5; margin: 0; max-width: 440px;
}
.si-illustration {
  margin-top: auto; align-self: center; margin-bottom: -8px;
}
.si-stamp {
  position: absolute; top: 200px; right: 56px; transform: rotate(8deg);
  pointer-events: none;
  background: #fff; border: 2px solid var(--line); border-radius: 4px;
  padding: 8px 14px; font-family: var(--body);
  font-size: 11.5px; font-weight: 700; color: var(--ink);
  letter-spacing: 0.05em; text-transform: uppercase;
  box-shadow: 3px 3px 0 var(--line); white-space: nowrap;
}

/* ── RIGHT panel — white form area ── */
.si-right {
  background: #fff;
  padding: 40px 56px;
  display: flex; flex-direction: column; justify-content: center;
}
.si-form-box { max-width: 440px; width: 100%; margin: 0 auto; }

/* Sign in / Create account tabs */
.si-tabs {
  display: flex;
  background: var(--surface);
  border: 2px solid var(--line);
  border-radius: 6px;
  padding: 4px;
  margin-bottom: 32px;
  gap: 2px;
  box-shadow: 3px 3px 0 var(--line);
}
.si-tabs button {
  flex: 1; padding: 10px 14px;
  background: transparent; color: var(--ink);
  border: none; border-radius: 4px;
  font-family: var(--body); font-weight: 700; font-size: 13.5px;
  letter-spacing: 0.01em; cursor: pointer;
  transition: background .15s, color .15s;
}
.si-tabs button.on { background: var(--ink); color: #fff; }

.si-h2 {
  font-family: var(--display); font-weight: 900; font-size: 32px;
  line-height: 1; color: var(--ink); text-transform: uppercase;
  letter-spacing: -0.02em; margin: 0 0 8px;
}
.si-sub {
  font-family: var(--body); font-size: 14px; color: var(--muted);
  margin: 0 0 24px;
}

/* Form field */
.si-field { display: flex; flex-direction: column; gap: 8px; }
.si-field label {
  display: block; font-family: var(--body);
  font-size: 12px; font-weight: 700; color: var(--ink);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.si-input {
  display: flex; align-items: center;
  background: #fff; border: 2px solid var(--line);
  border-radius: 4px; padding: 0 6px;
}
.si-input input {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: var(--body); font-size: 16px; color: var(--ink);
  padding: 14px 10px; min-width: 0;
}
.si-input .show-toggle {
  background: transparent; border: none; cursor: pointer;
  color: var(--muted); padding: 8px 10px;
  font-family: var(--body); font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
}

/* Keep me signed in row */
.si-keep-row {
  display: flex; justify-content: space-between; align-items: center;
}
.si-keep {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--body); font-size: 14px; color: var(--ink);
  cursor: pointer; white-space: nowrap;
}
.si-keep input { width: 16px; height: 16px; accent-color: var(--accent); }
.forgot-link {
  font-family: var(--body); font-size: 14px; font-weight: 600;
  color: var(--accent); text-decoration: none;
}
.forgot-link:hover { text-decoration: underline; }

/* Submit button — chunky purple with offset shadow */
.si-submit {
  padding: 15px 22px;
  background: var(--accent); color: #fff;
  border: 2px solid var(--line); border-radius: 4px;
  font-family: var(--body); font-weight: 700; font-size: 16px;
  cursor: pointer; margin-top: 6px;
  box-shadow: 4px 4px 0 var(--line);
  transition: transform .12s, box-shadow .12s;
}
.si-submit:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--line); }
.si-submit:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--line); }
.si-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: 4px 4px 0 var(--line); }

/* Divider */
.si-divider {
  display: flex; align-items: center; gap: 12px; margin: 4px 0;
}
.si-divider .line { flex: 1; height: 2px; background: var(--line); opacity: 0.15; }
.si-divider span {
  font-family: var(--body); font-size: 11px; color: var(--muted);
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
}

/* Google button (visual only — wire up later if you add OAuth) */
.si-google {
  padding: 13px 18px;
  background: #fff; color: var(--ink);
  border: 2px solid var(--line); border-radius: 4px;
  font-family: var(--body); font-weight: 700; font-size: 14.5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

.si-switch-row {
  text-align: center; margin-top: 4px;
  font-family: var(--body); font-size: 14px; color: var(--muted);
}
.si-switch-row a {
  font-family: var(--body); font-size: 14px; font-weight: 700;
  color: var(--accent); text-decoration: none; cursor: pointer;
}
.si-switch-row a:hover { text-decoration: underline; }

/* Error box */
.si-err {
  background: #FEE7E5;
  border: 2px solid var(--bad);
  border-radius: 4px;
  padding: 12px 14px;
  font-family: var(--body); font-size: 13.5px; font-weight: 600;
  color: var(--bad);
  margin-bottom: 16px; display: none;
}
.si-err.on { display: block; }

/* ── Mobile responsive: stack columns ── */
@media (max-width: 880px) {
  .si-grid { grid-template-columns: 1fr; }
  .si-left {
    padding: 24px 24px 32px;
    border-right: none; border-bottom: 3px solid var(--line);
  }
  .si-h1 { font-size: 38px; }
  .si-illustration { margin-top: 24px; }
  .si-illustration svg { max-width: 100%; height: auto; }
  .si-stamp { display: none; }
  .si-right { padding: 32px 24px; }
}
</style>
</head>
<body>

<script>
/* Tabs: signin tab stays on this page; signup tab navigates to /signup */
function switchTab(tab) {
  if (tab === 'signup') {
    window.location.href = '/signup';
    return;
  }
  /* (signin tab is already active) */
}

function togglePwd() {
  var input = document.getElementById('password');
  var btn = document.getElementById('showBtn');
  if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
  else { input.type = 'password'; btn.textContent = 'Show'; }
}

function showErr(msg) {
  var box = document.getElementById('errBox');
  box.textContent = msg;
  box.classList.add('on');
}

var urlParams = new URLSearchParams(window.location.search);
var redirectTo = urlParams.get('next') || '/dashboard';

async function signin(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email || !password) { showErr('Please enter your email and password'); return false; }

  document.getElementById('errBox').classList.remove('on');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: email, password: password }),
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign in failed');
    window.location.href = redirectTo;
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Sign in →';
    showErr(err.message || 'Sign in failed');
  }
  return false;
}

/* If URL ends in #signup, redirect to signup */
if (window.location.hash === '#signup') {
  window.location.href = '/signup';
}
</script>

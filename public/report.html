<!doctype html>
<!-- BA3 REPORT · 7-section audit report · BuilderAudit production -->
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audit report — BuilderAudit</title>
<link rel="icon" type="image/svg+xml" href="/assets/logo/builderaudit-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/logo/apple-touch-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
<style>
/* ════════════════════════════════════════════════════════════════════
   BA3 REPORT · Design tokens + page-specific styles
   All render functions (renderOverview, renderIssues etc) are kept
   exactly as-is — only the visual layer changes here.
   ════════════════════════════════════════════════════════════════════ */

/* BA3 tokens — override app.css variables */
:root {
  --font:        'IBM Plex Sans', -apple-system, sans-serif;
  --display:     'Hanken Grotesk', -apple-system, sans-serif;
  --fill:        #FFD24D;
  --accent:      #5247B8;
  --surface:     #FBF5E1;
  --ink:         #1B1A17;
  --line:        #1B1A17;
  --muted:       #5C5851;
  --good:        #1F8A5B;
  --bad:         #D9534F;
  --amber:       #D97706;
  /* Kept for compatibility with render functions that reference these: */
  --ice:         #E8E2D6;
  --mist:        #F4EFE4;
  --slate-text:  #5C5851;
  --slate-deep:  #3D3830;
  --slate:       #8A7E72;
  --azure:       #5247B8;
  --azure-tint:  rgba(82,71,184,0.08);
  --azure-deep:  #3B31A0;
  --coral:       #5247B8;
  --red-signal:  #D9534F;
  --red-tint:    rgba(217,83,79,0.10);
  --red-ink:     #A02020;
  --green:       #1F8A5B;
  --green-light: rgba(31,138,91,0.12);
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--surface); min-height: 100vh; }
body { font-family: var(--font); color: var(--ink); -webkit-font-smoothing: antialiased; font-size: 15px; }
a { -webkit-tap-highlight-color: transparent; }

/* ── Top nav ── */
.report-nav {
  background: #fff;
  border-bottom: 3px solid var(--line);
  position: sticky; top: 0; z-index: 50;
}
.report-nav-inner {
  max-width: 1200px; margin: 0 auto;
  padding: 16px 36px;
  display: flex; align-items: center; gap: 20px;
}
.report-back {
  font-family: var(--font); font-size: 13px; font-weight: 700;
  color: var(--muted); text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: color .15s;
}
.report-back:hover { color: var(--ink); }
.report-domain { font-family: var(--display); font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: -.01em; }
.report-domain-meta { font-family: var(--font); font-size: 11px; color: var(--muted); margin-top: 2px; }
.report-score-chip {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px;
  background: var(--ink); color: #fff;
  border: 2px solid var(--line);
  border-radius: 999px;
  font-family: var(--display); font-weight: 800;
}
.score-chip-num { font-size: 20px; }
.score-chip-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; opacity: .75; }

/* delta pill for live score changes */
.score-chip-delta {
  font-size: 11px; font-weight: 700; padding: 2px 8px;
  background: var(--good); color: #fff;
  border-radius: 999px; margin-left: 6px;
  opacity: 0; transform: translateY(4px);
  transition: opacity .3s, transform .3s;
}
.score-chip-delta.show { opacity: 1; transform: translateY(0); }
.score-adjusting { animation: scoreFlash .5s ease; }
@keyframes scoreFlash { 0%,100% { opacity:1; } 50% { opacity:.6; } }

/* ── Sidebar nav ── */
.side-nav {
  background: #fff;
  border: 2px solid var(--line);
  border-radius: 10px;
  padding: 10px;
  box-shadow: 4px 4px 0 var(--line);
  margin-bottom: 20px;
}
.side-nav-title {
  font-family: var(--font); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
  padding: 6px 10px 4px;
}
.side-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  text-decoration: none; color: var(--ink);
  font-family: var(--font); font-size: 13.5px; font-weight: 600;
  border-radius: 6px;
  transition: background .12s;
}
.side-nav a:hover { background: var(--mist); }
.side-nav a.active { background: var(--fill); color: var(--ink); font-weight: 700; }
.side-nav-icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.side-nav-badge {
  margin-left: auto; font-size: 10px; padding: 2px 8px;
  border-radius: 999px; font-weight: 700;
  background: var(--red-tint); color: var(--red-ink);
  border: 1px solid var(--bad);
}
.side-nav-badge.ok { background: var(--green-light); color: var(--good); border-color: var(--good); }

/* ── Layout ── */
.report-layout { max-width: 1200px; margin: 0 auto; padding: 32px 36px 80px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }
.report-layout > .side-nav { position: sticky; top: 88px; }
.report-main { min-width: 0; }

@media (max-width: 900px) {
  .report-layout { grid-template-columns: 1fr; padding: 20px 18px 60px; }
  .report-layout > .side-nav { position: static; }
  .report-nav-inner { padding: 14px 20px; }
  .side-nav { display: flex; flex-wrap: wrap; padding: .5rem; gap: 2px; }
  .side-nav-title { display: none; }
  .side-nav a { font-size: 12px; padding: 6px 10px; }
  .side-nav-badge { display: none; }
}

/* ── Loading state ── */
.scan-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
.scan-core { position: relative; width: 80px; height: 80px; }
.scan-ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; }
.scan-ring-1 { border-top-color: var(--accent); animation: spin 1.2s linear infinite; }
.scan-ring-2 { inset: 10px; border-right-color: var(--fill); animation: spin 0.9s linear infinite reverse; }
.scan-ring-3 { inset: 20px; border-bottom-color: var(--ink); animation: spin 0.7s linear infinite; }
.scan-center { position: absolute; inset: 0; display: grid; place-items: center; font-size: 22px; }
.scan-phase { font-family: var(--display); font-weight: 800; font-size: 18px; color: var(--ink); text-transform: uppercase; letter-spacing: -.01em; }
.scan-message { font-family: var(--font); font-size: 14px; color: var(--muted); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Lock screen ── */
.lock-screen {
  max-width: 520px; margin: 4rem auto;
  background: #fff; border: 3px solid var(--line);
  border-radius: 14px; padding: 2.5rem 2rem;
  text-align: center; box-shadow: 6px 6px 0 var(--line);
}
.lock-preview { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--ice); }
.lock-score { font-family: var(--display); font-size: 64px; font-weight: 900; letter-spacing: -.04em; line-height: 1; margin-bottom: 8px; color: var(--ink); }
.lock-company { font-family: var(--display); font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.lock-url { font-size: 12px; color: var(--muted); font-family: monospace; }
.lock-headline { font-family: var(--display); font-size: 22px; font-weight: 900; margin-bottom: 10px; letter-spacing: -.02em; text-transform: uppercase; }
.lock-sub { font-size: 14px; color: var(--slate-deep); line-height: 1.6; margin-bottom: 1.5rem; }
.lock-input {
  width: 100%; padding: 13px 16px;
  border: 2px solid var(--line); border-radius: 6px;
  font-size: 15px; font-family: var(--font);
  outline: none; margin-bottom: 10px;
  background: var(--surface);
  transition: border-color .2s;
}
.lock-input:focus { border-color: var(--accent); }
.lock-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff;
  border: 2px solid var(--line); border-radius: 6px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: var(--font);
  box-shadow: 4px 4px 0 var(--line);
  transition: transform .12s, box-shadow .12s;
}
.lock-btn:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--line); }
.lock-btn:disabled { opacity: .5; }
.lock-fineprint { font-size: 11px; color: var(--muted); margin-top: 12px; line-height: 1.5; }

/* ── Section headers ── */
.sp-header { margin-bottom: 24px; }
.sp-eyebrow {
  font-family: var(--font); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent); margin-bottom: 8px;
}
.sp-title {
  font-family: var(--display); font-size: 32px; font-weight: 900;
  letter-spacing: -.02em; line-height: 1.1;
  text-transform: uppercase; margin-bottom: 10px; color: var(--ink);
}
.sp-sub { font-family: var(--font); font-size: 15px; color: var(--muted); line-height: 1.55; max-width: 640px; }
.section-divider { height: 2px; background: var(--ice); margin: 2rem 0; }

/* ── Score band on overview ── */
.score-band {
  display: grid; grid-template-columns: 140px 1fr; gap: 24px; align-items: center;
  background: var(--ink); color: #fff;
  border: 3px solid var(--line); border-radius: 14px;
  padding: 28px; margin-bottom: 20px;
  box-shadow: 6px 6px 0 var(--line);
}
.ring-wrap { position: relative; width: 110px; height: 110px; }
.ring-wrap svg { width: 110px; height: 110px; }
.ring-num {
  position: absolute; inset: 0; display: grid; place-items: center;
  font-family: var(--display); font-size: 36px; font-weight: 900;
  color: #fff; letter-spacing: -.03em;
}
.score-hl { font-family: var(--display); font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
.score-sub { font-family: var(--font); font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.5; margin-bottom: 10px; }
.ai-voice {
  font-family: var(--font); font-size: 14px; font-style: italic; line-height: 1.6;
  color: rgba(255,255,255,0.85);
  border-left: 3px solid var(--fill); padding-left: 14px; margin-top: 12px;
}

/* ── Business snapshot cards ── */
.bs-section { background: #fff; border: 2px solid var(--line); border-radius: 10px; padding: 22px; box-shadow: 4px 4px 0 var(--line); margin-bottom: 14px; }
.bs-header { margin-bottom: 16px; }
.bs-company { font-family: var(--display); font-size: 26px; font-weight: 900; color: var(--ink); letter-spacing: -.02em; }
.bs-oneliner { font-family: var(--font); font-size: 15px; color: var(--muted); margin-top: 6px; line-height: 1.45; }
.bs-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.bs-chip { padding: 5px 12px; background: var(--surface); border: 1.5px solid var(--line); border-radius: 999px; font-family: var(--font); font-size: 12.5px; color: var(--ink); }
.bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
.bs-card { background: var(--surface); border: 1.5px solid var(--line); border-radius: 8px; padding: 14px 16px; }
.bs-card-title { font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.bs-card-icon { font-size: 10px; }
.bs-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.bs-pill { padding: 4px 10px; background: #fff; border: 1.5px solid var(--line); border-radius: 999px; font-family: var(--font); font-size: 12.5px; color: var(--ink); font-weight: 500; }
.bs-pill-accred { background: var(--fill); border-color: var(--line); font-weight: 700; }
.bs-pill-award { background: rgba(82,71,184,0.1); border-color: var(--accent); color: var(--accent); font-weight: 700; }
.bs-item { font-family: var(--font); font-size: 13.5px; color: var(--ink); padding: 4px 0; line-height: 1.45; }
.bs-list { display: flex; flex-direction: column; gap: 4px; }
.bs-empty { font-family: var(--font); font-size: 13px; color: var(--muted); font-style: italic; }
.bs-team-item { font-family: var(--font); font-size: 13.5px; font-weight: 600; color: var(--ink); padding: 2px 0; }
.bs-team-role { font-size: 11px; font-weight: 400; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.bs-gaps { background: rgba(217,83,79,0.07); border: 2px solid var(--bad); border-radius: 8px; padding: 16px 18px; margin-top: 14px; }
.bs-gaps-title { font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--bad); margin-bottom: 10px; }
.bs-gap-item { font-family: var(--font); font-size: 13.5px; color: var(--ink); padding: 4px 0; display: flex; gap: 8px; line-height: 1.45; }
.bs-gap-item::before { content: '·'; color: var(--bad); font-weight: 700; flex-shrink: 0; }

/* ── Trust issues ── */
.bp-list { display: flex; flex-direction: column; gap: 10px; }
.bp-card {
  background: #fff; border: 2px solid var(--line); border-radius: 8px;
  padding: 18px 18px 14px; box-shadow: 3px 3px 0 var(--line);
}
.bp-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.bp-dot { flex: 0 0 auto; width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; }
.dot-critical, .dot-high { background: var(--bad); }
.dot-medium { background: var(--amber); }
.dot-low { background: var(--good); }
.bp-title { flex: 1; font-family: var(--display); font-size: 16px; font-weight: 800; color: var(--ink); line-height: 1.3; }
.bp-impact {
  flex: 0 0 auto; padding: 3px 10px;
  border: 1.5px solid var(--line); border-radius: 999px;
  font-family: var(--font); font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
}
.bp-impact-critical, .bp-impact-high { background: var(--red-tint); color: var(--red-ink); border-color: var(--bad); }
.bp-impact-medium { background: rgba(217,119,6,0.1); color: #92400E; border-color: var(--amber); }
.bp-impact-low { background: var(--green-light); color: var(--good); border-color: var(--good); }
.bp-evidence, .bp-homeowner { font-family: var(--font); font-size: 14px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
.bp-homeowner { font-style: italic; color: var(--ink); background: var(--surface); border-left: 3px solid var(--fill); padding: 10px 14px; border-radius: 0 6px 6px 0; }
.bp-fix-label { font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--accent); margin-bottom: 6px; }
.bp-fix {
  background: rgba(82,71,184,0.06); border: 1.5px solid var(--accent);
  border-radius: 6px; padding: 12px 14px;
  font-family: var(--font); font-size: 13.5px; color: var(--ink); line-height: 1.5;
}

/* ── Journey ── */
.journey-list { display: flex; flex-direction: column; gap: 14px; }
.feed-list { display: flex; flex-direction: column; gap: 14px; }
.feed-item { background: #fff; border: 2px solid var(--line); border-radius: 8px; padding: 18px; box-shadow: 3px 3px 0 var(--line); }
.feed-step { font-family: var(--font); font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 6px; }
.feed-quote { font-family: var(--font); font-size: 15px; font-style: italic; line-height: 1.6; color: var(--ink); margin-bottom: 10px; border-left: 3px solid var(--fill); padding-left: 14px; }
.feed-meta { display: flex; align-items: center; gap: 8px; }
.feed-sentiment { padding: 3px 10px; border-radius: 999px; font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; border: 1.5px solid var(--line); }
.sentiment-positive { background: var(--green-light); color: var(--good); border-color: var(--good); }
.sentiment-negative { background: var(--red-tint); color: var(--red-ink); border-color: var(--bad); }
.sentiment-neutral { background: var(--surface); color: var(--muted); }

/* ── Image verification ── */
.iv-summary { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.iv-stat { background: #fff; border: 2px solid var(--line); border-radius: 8px; padding: 16px 20px; flex: 1; min-width: 100px; box-shadow: 3px 3px 0 var(--line); }
.iv-num { font-family: var(--display); font-size: 36px; font-weight: 900; line-height: 1; letter-spacing: -.02em; }
.iv-num-bad { color: var(--bad); }
.iv-num-warn { color: var(--amber); }
.iv-num-good { color: var(--good); }
.iv-lbl { font-family: var(--font); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; margin-top: 4px; }
.iv-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.iv-card { background: #fff; border: 2px solid var(--line); border-radius: 8px; overflow: hidden; box-shadow: 3px 3px 0 var(--line); }
.iv-card.overridden { opacity: .55; }
.iv-thumb { position: relative; height: 160px; background: var(--mist); overflow: hidden; }
.iv-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.iv-thumb-fallback { position: absolute; inset: 0; display: grid; place-items: center; font-size: 32px; color: var(--muted); }
.iv-thumb-overlay {
  position: absolute; top: 8px; left: 8px;
  padding: 3px 10px; border: 2px solid var(--line); border-radius: 999px;
  font-family: var(--font); font-size: 10.5px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
}
.iv-thumb-overlay.stock { background: var(--bad); color: #fff; }
.iv-thumb-overlay.dup   { background: var(--amber); color: #fff; }
.iv-body { padding: 14px 16px; }
.iv-badge { padding: 3px 10px; border-radius: 999px; font-family: var(--font); font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; border: 1.5px solid var(--line); }
.ivb-stock { background: var(--red-tint); color: var(--red-ink); border-color: var(--bad); }
.ivb-dup   { background: rgba(217,119,6,0.1); color: #92400E; border-color: var(--amber); }
.iv-source { font-family: var(--font); font-size: 13px; color: var(--muted); margin: 8px 0; line-height: 1.4; }
.iv-matches { margin-top: 8px; }
.iv-matches-title { font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 4px; }
.iv-match-link { display: block; font-family: var(--font); font-size: 12.5px; color: var(--accent); text-decoration: none; padding: 2px 0; }
.iv-match-link:hover { text-decoration: underline; }
.iv-impact { font-family: var(--font); font-size: 13px; color: var(--ink); line-height: 1.45; margin-top: 10px; background: rgba(217,83,79,0.06); border: 1.5px solid var(--bad); border-radius: 5px; padding: 8px 10px; }
.iv-override { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1.5px solid var(--ice); }
.iv-override-label { flex: 1; font-family: var(--font); font-size: 13px; color: var(--ink); }
.iv-toggle {
  width: 44px; height: 24px; border-radius: 99px; border: 2px solid var(--line); background: var(--surface); cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0;
}
.iv-toggle::after { content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background: var(--muted); transition: left .2s, background .2s; }
.iv-toggle.on { background: var(--good); border-color: var(--good); }
.iv-toggle.on::after { left: calc(100% - 18px); background: #fff; }
.iv-none { text-align: center; padding: 3rem 2rem; }
.iv-none-icon { font-size: 48px; margin-bottom: 12px; color: var(--good); }
.iv-none-text { font-family: var(--display); font-size: 20px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
.iv-none-sub { font-family: var(--font); font-size: 14px; color: var(--muted); }
/* Lightbox */
.iv-lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.iv-lightbox.on { display: flex; }
.iv-lightbox img { max-width: 90vw; max-height: 80vh; border: 3px solid #fff; border-radius: 6px; object-fit: contain; }
.iv-lightbox-close { position: absolute; top: 20px; right: 24px; background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.3); border-radius: 50%; width: 36px; height: 36px; color: #fff; font-size: 16px; cursor: pointer; display: grid; place-items: center; }
.iv-lightbox-caption { color: rgba(255,255,255,.8); font-family: var(--font); font-size: 13px; }

/* ── Competitor gap ── */
.gap-card { background: #fff; border: 2px solid var(--line); border-radius: 10px; padding: 22px; box-shadow: 4px 4px 0 var(--line); }
.gap-summary { font-family: var(--font); font-size: 15px; color: var(--ink); line-height: 1.6; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px solid var(--ice); }
.gap-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.gap-col { padding: 16px; border-radius: 8px; }
.gc-bad { background: var(--red-tint); border: 1.5px solid var(--bad); }
.gc-good { background: var(--green-light); border: 1.5px solid var(--good); }
.gap-col-head { font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 12px; }
.gc-bad .gap-col-head { color: var(--red-ink); }
.gc-good .gap-col-head { color: var(--good); }
.gap-item { display: flex; gap: 10px; font-family: var(--font); font-size: 14px; color: var(--ink); line-height: 1.45; margin-bottom: 8px; }
.gi-icon { flex: 0 0 auto; font-weight: 800; }
.gc-bad .gi-icon { color: var(--bad); }
.gc-good .gi-icon { color: var(--good); }

/* ── Actions ── */
.actions-wrap { background: #fff; border: 2px solid var(--line); border-radius: 10px; padding: 22px; box-shadow: 4px 4px 0 var(--line); }
.actions-head { font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 14px; }
.action-row { display: flex; gap: 14px; align-items: flex-start; padding: 12px 0; border-bottom: 1.5px solid var(--ice); }
.action-row:last-child { border-bottom: none; }
.a-num { flex: 0 0 auto; width: 28px; height: 28px; border-radius: 50%; background: var(--fill); border: 2px solid var(--line); display: grid; place-items: center; font-family: var(--display); font-size: 12px; font-weight: 900; color: var(--ink); }
.a-text { font-family: var(--font); font-size: 14.5px; color: var(--ink); line-height: 1.5; }

/* ── Service enquiry cards (keep existing CTA styles working) ── */
.service-card-btn {
  padding: 12px 20px; background: var(--fill); color: var(--ink);
  border: 2px solid var(--line); border-radius: 6px;
  font-family: var(--font); font-weight: 700; font-size: 14px; cursor: pointer;
  box-shadow: 3px 3px 0 var(--line);
  transition: transform .12s;
}
.service-card-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--line); }

/* ── Enquiry modal ── */
.enq-modal { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 300; display: none; align-items: center; justify-content: center; }
.enq-modal.on { display: flex; }
.enq-box { background: #fff; border: 3px solid var(--line); border-radius: 14px; padding: 2rem; width: 90%; max-width: 460px; box-shadow: 8px 8px 0 var(--line); }
.enq-title { font-family: var(--display); font-size: 22px; font-weight: 900; color: var(--ink); text-transform: uppercase; margin: 0 0 8px; }
.enq-sub { font-family: var(--font); font-size: 14px; color: var(--muted); margin: 0 0 18px; line-height: 1.5; }
.enq-label { font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 5px; display: block; }
.enq-input, .enq-textarea {
  width: 100%; padding: 11px 14px;
  border: 2px solid var(--line); border-radius: 6px;
  font-family: var(--font); font-size: 14.5px; color: var(--ink);
  background: var(--surface); outline: none; margin-bottom: 14px;
}
.enq-input:focus, .enq-textarea:focus { border-color: var(--accent); }
.enq-textarea { min-height: 90px; resize: vertical; }
.enq-actions { display: flex; gap: 10px; margin-top: 4px; }
.enq-submit {
  flex: 1; padding: 13px; background: var(--accent); color: #fff;
  border: 2px solid var(--line); border-radius: 6px;
  font-family: var(--font); font-weight: 700; font-size: 15px; cursor: pointer;
  box-shadow: 4px 4px 0 var(--line);
}
.enq-cancel {
  padding: 13px 18px; background: #fff; color: var(--ink);
  border: 2px solid var(--line); border-radius: 6px;
  font-family: var(--font); font-weight: 700; font-size: 15px; cursor: pointer;
}
.enq-success { text-align: center; padding: 1.5rem 0; }
.enq-success-icon { font-size: 40px; color: var(--good); margin-bottom: 12px; }
.enq-success-title { font-family: var(--display); font-size: 22px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
.enq-success-msg { font-family: var(--font); font-size: 14px; color: var(--muted); line-height: 1.5; }

/* ── Re-analyse ── */
.reanalyze-btn {
  margin-left: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700;
  background: var(--accent); color: #fff;
  border: 2px solid var(--line); border-radius: 4px; cursor: pointer;
  font-family: var(--font);
  display: inline-flex; align-items: center; gap: 6px;
  box-shadow: 3px 3px 0 var(--line);
  transition: transform .12s;
}
.reanalyze-btn:hover { transform: translate(-1px,-1px); }
.reanalyze-btn:disabled { opacity: .5; cursor: not-allowed; }
.reanalyze-overlay { position: fixed; inset: 0; background: rgba(27,26,23,.85); display: none; align-items: center; justify-content: center; z-index: 200; }
.reanalyze-overlay.on { display: flex; }
.reanalyze-box { background: var(--ink); border: 2px solid rgba(255,255,255,.12); border-radius: 14px; padding: 2rem 2.5rem; text-align: center; max-width: 420px; }
.reanalyze-title { font-family: var(--display); font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 8px; }
.reanalyze-msg { font-size: 14px; color: rgba(255,255,255,.7); line-height: 1.5; font-family: var(--font); }
.reanalyze-box .scan-core { width: 70px; height: 70px; margin: 0 auto 1.5rem; }
.reanalyze-box .scan-core svg { width: 70px; height: 70px; }

/* ── Update banner ── */
.update-banner { display: none; background: var(--azure-tint); border-bottom: 2px solid var(--ice); padding: 10px 36px; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--accent); text-align: center; position: sticky; top: 66px; z-index: 49; }
.update-banner.show { display: flex; align-items: center; justify-content: center; gap: 8px; }
.update-banner.success { background: var(--green-light); color: var(--good); }
.update-banner.error { background: var(--red-tint); color: var(--red-ink); }
.update-banner .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulseDot 1.2s ease-in-out infinite; }
@keyframes pulseDot { 0%,100% { opacity:.3; transform:scale(1); } 50% { opacity:1; transform:scale(1.15); } }
.update-banner.success .dot, .update-banner.error .dot { animation: none; opacity: 1; }
.update-banner .spinner-mini { width: 12px; height: 12px; border: 1.5px solid rgba(82,71,184,.3); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
.update-banner button { background: none; border: none; color: currentColor; font-size: 12px; font-weight: 700; cursor: pointer; padding: 2px 8px; margin-left: 4px; text-decoration: underline; font-family: var(--font); }

/* ── Report layout tabs (slide nav) ── */
.report-layout-tabs { display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
@media (max-width: 900px) { .report-layout-tabs { grid-template-columns: 1fr; } }

/* ── Journey steps (the step/page chip on feed items) ── */
.journey-step-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; background: var(--fill); border: 1.5px solid var(--line); border-radius: 999px; font-family: var(--font); font-size: 11px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }

/* Spinner for mini uses (re-analyse overlay, etc) */
.spinner-mini { width: 12px; height: 12px; border: 1.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }

</style>
</head>
<body>

<script>
/* ═══ Report shell ═══════════════════════════════════════════════════════════
   This page handles /report/:id and /report/:id/:section.
   On load: fetch /api/report/:id/data
   If locked: show email gate.
   If unlocked: load the requested section.
══════════════════════════════════════════════════════════════════════════════ */

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var pathParts = window.location.pathname.split('/').filter(Boolean);
var REPORT_ID = pathParts[1];
var SECTION = pathParts[2] || 'overview';

var reportData = null;
var reportOverrides = {};
var currentScore = 0;
var reportAudience = 'builder';

function sc(n){return n>=70?'g':n>=45?'a':'r'}
function cc(n){return 'c-'+sc(n)}
function fc(n){return 'f-'+sc(n)}
function stageLabel(s){return{first_impression:'First impression',scrolling:'As they scroll',decision_moment:'Decision moment'}[s]||s}
function impactPill(i){return '<span class="bp-pill pill-'+(i||'medium')+'">'+esc(i)+'</span>'}

function ringPath(score,size){
  size=size||88;
  var r=size*0.386, circ=2*Math.PI*r, offset=circ*(1-score/100);
  var col=score>=70?'#059669':score>=45?'#FFB020':'#FF2E2E';
  var cx=size/2, cy=size/2;
  return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#1E293B" stroke-width="7"/>' +
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="7" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'" stroke-linecap="round" transform="rotate(-90 '+cx+' '+cy+')"/>';
}

function countUp(el,from,to,duration){
  var start=performance.now();
  function tick(now){
    var t=Math.min(1,(now-start)/duration);
    var eased=1-Math.pow(1-t,3);
    el.textContent=Math.round(from+(to-from)*eased);
    if(t<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function setupReveal(root){
  var selectors=['.bs-section','.score-band','.journey-list','.bp-list','.tq-list','.feed-list','.photo-cols','.gap-card','.actions-wrap','.iv-summary','.iv-list','.iv-none','.bs-grid','.bs-header','.bs-gaps','.sp-header'];
  selectors.forEach(function(sel){
    root.querySelectorAll(sel).forEach(function(el){
      el.classList.add('reveal');
      if(el.children.length>1&&(sel==='.journey-list'||sel==='.bp-list'||sel==='.tq-list'||sel==='.bs-grid'||sel==='.iv-list')){
        el.classList.add('stagger');
      }
    });
  });
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.classList.add('shown');
        io.unobserve(entry.target);
      }
    });
  },{threshold:.08,rootMargin:'0px 0px -40px 0px'});
  root.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
}

/* ═══ Initial load ═══ */
(async function init(){
  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/data');
    if(!res.ok){
      if(res.status===404){showNotFound();return;}
      throw new Error('Could not load report');
    }
    var data=await res.json();
    if(data.locked){
      showLockScreen(data);
    } else {
      reportData=data.report;
      reportOverrides=data.overrides||{};
      currentScore=(reportData&&reportData.hero&&reportData.hero.score)||0;
      reportAudience=data.audience||'builder';
      showTopNav(data);
      renderSection(SECTION);
    }
  }catch(e){
    document.getElementById('mainArea').innerHTML='<div style="max-width:600px;margin:4rem auto"><div class="error-card">Error: '+esc(e.message)+'</div></div>';
  }
})();

function showNotFound(){
  document.getElementById('mainArea').innerHTML='<div style="max-width:520px;margin:5rem auto;text-align:center;padding:3rem 2rem;background:#fff;border:1px solid var(--ice);border-radius:16px">'+
    '<h1 style="font-size:24px;font-weight:700;margin-bottom:10px">Report not found</h1>'+
    '<p style="color:var(--slate-deep);margin-bottom:1.5rem">This audit link is invalid or the report has expired.</p>'+
    '<a href="/audit" class="hero-cta" style="display:inline-flex;background:var(--coral);color:#fff;padding:12px 22px;border-radius:10px;text-decoration:none;font-weight:600">Run a new audit &rarr;</a>'+
    '</div>';
}

function showLockScreen(preview){
  var score=preview.score||0;
  var color=sc(score);
  var main=document.getElementById('mainArea');
  var domain='';try{domain=new URL(preview.url).hostname;}catch(e){domain=preview.url;}

  /* Reveal the top nav with score and domain (low-key teaser) */
  showTopNav({
    url: preview.url,
    scannedAt: preview.scannedAt,
    report: { hero: { score: score } }
  });

  /* Render fake "report-behind-glass" content at low opacity behind the modal —
     enough hint of the report being there to feel like there's value to unlock,
     without giving away anything specific. */
  main.innerHTML =
    '<div class="lock-stage">' +
      '<div class="aurora-wrap" aria-hidden="true"></div>' +
      '<div class="aurora-mask" aria-hidden="true"></div>' +

      /* Faux blurred report content. Realistic enough to feel meaningful, vague enough to give nothing away. */
      '<div class="lock-fakereport" aria-hidden="true">' +
        '<div class="fake-tabs">' +
          '<span class="fake-tab fake-active">Overview</span>' +
          '<span class="fake-tab">Snapshot</span>' +
          '<span class="fake-tab">Issues <span class="fake-badge">7</span></span>' +
          '<span class="fake-tab">Journey</span>' +
          '<span class="fake-tab">Images</span>' +
          '<span class="fake-tab">Competitors</span>' +
          '<span class="fake-tab">Actions</span>' +
        '</div>' +
        '<div class="fake-hero">' +
          '<div class="fake-score-ring c-' + color + '"><div class="fake-score-num">' + score + '</div></div>' +
          '<div class="fake-hero-text">' +
            '<div class="fake-eyebrow">Trust audit · ' + esc(domain) + '</div>' +
            '<div class="fake-h1">Your full report is ready</div>' +
            '<div class="fake-h-sub">█████████████████████████████████ ███████████ ████████ ██████ ████████████.</div>' +
          '</div>' +
        '</div>' +
        '<div class="fake-grid">' +
          '<div class="fake-card"><div class="fake-card-h">Trust breakpoints</div>' +
            '<div class="fake-row"></div><div class="fake-row"></div><div class="fake-row" style="width:60%"></div></div>' +
          '<div class="fake-card"><div class="fake-card-h">Image verification</div>' +
            '<div class="fake-row"></div><div class="fake-row" style="width:80%"></div><div class="fake-row" style="width:55%"></div></div>' +
          '<div class="fake-card"><div class="fake-card-h">Homeowner journey</div>' +
            '<div class="fake-row"></div><div class="fake-row" style="width:75%"></div></div>' +
          '<div class="fake-card"><div class="fake-card-h">Action plan</div>' +
            '<div class="fake-row"></div><div class="fake-row"></div><div class="fake-row" style="width:65%"></div></div>' +
        '</div>' +
      '</div>' +

      /* The signup overlay floating above the blurred content */
      '<div class="lock-overlay">' +
        '<div class="lock-modal">' +
          '<div class="lock-modal-eyebrow">Trust audit complete</div>' +
          '<div class="lock-modal-score-row">' +
            '<div class="lock-modal-score c-' + color + '">' + score + '</div>' +
            '<div class="lock-modal-score-label">' +
              '<div class="lock-modal-domain">' + esc(preview.companyName || domain) + '</div>' +
              '<div class="lock-modal-url">' + esc(domain) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="lock-modal-h">Create a free account to unlock your full report</div>' +
          '<ul class="lock-modal-list">' +
            '<li>Every trust breakpoint with the exact wording that fails</li>' +
            '<li>Image verification — duplicates and stock imagery flagged</li>' +
            '<li>Personalised action plan ranked by impact</li>' +
            '<li>Re-analyse free anytime as you fix things</li>' +
          '</ul>' +
          '<a href="/signup?claim=' + encodeURIComponent(REPORT_ID) + '" class="lock-btn" style="text-decoration:none;display:block;box-sizing:border-box;text-align:center">Create account &amp; unlock &rarr;</a>' +
          '<div class="lock-fineprint">Already have an account? <a href="/login?next=/report/' + encodeURIComponent(REPORT_ID) + '">Log in</a></div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function showTopNav(data){
  var nav=document.getElementById('reportNav');
  nav.style.display='block';
  /* Show Dashboard link if user is logged in */
  fetch('/api/auth/me',{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
    if(d.user){var l=document.getElementById('reportDashLink');if(l)l.style.display='inline-flex';}
  }).catch(function(){});
  var domain='';try{domain=new URL(data.url).hostname;}catch(e){domain=data.url;}
  document.getElementById('navDomain').textContent=domain;
  var date=new Date(data.scannedAt).toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'});
  document.getElementById('navDate').textContent='Audited '+date;
  if(data.report&&data.report.hero){
    document.getElementById('navScore').style.display='flex';
    document.getElementById('navScoreNum').textContent=data.report.hero.score||'—';
  }
  /* Check if this report supports re-analysis */
  fetchReanalyzeAvailability();
}

async function fetchReanalyzeAvailability(){
  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/meta');
    if(!res.ok)return;
    var meta=await res.json();
    var btn=document.getElementById('reanalyzeBtn');
    if(!btn)return;
    if(meta.canReanalyze){
      btn.style.display='inline-flex';
      if(meta.lastAnalyzedAt){
        var analyzedDate=new Date(meta.lastAnalyzedAt).toLocaleString('en-GB',{dateStyle:'short',timeStyle:'short'});
        btn.title='Last analysed: '+analyzedDate+'. Click to run a fresh AI analysis with the latest prompt and scoring logic.';
      }
    }
  }catch(e){console.warn('Meta check failed:',e);}
}

async function reanalyze(){
  var btn=document.getElementById('reanalyzeBtn');
  var overlay=document.getElementById('reanalyzeOverlay');
  var title=document.getElementById('reanalyzeTitle');
  var msg=document.getElementById('reanalyzeMsg');
  btn.disabled=true;
  overlay.classList.add('on');
  title.textContent='Re-analysing';
  msg.textContent='Loading your stored audit data...';

  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/reanalyze',{method:'POST'});
    var reader=res.body.getReader(),dec=new TextDecoder(),buf='';
    while(true){
      var r=await reader.read();
      if(r.done)break;
      buf+=dec.decode(r.value,{stream:true});
      var lines=buf.split('\n');
      buf=lines.pop();
      var lastEvt=null;
      for(var i=0;i<lines.length;i++){
        var line=lines[i];
        if(line.startsWith('event: ')){lastEvt=line.slice(7).trim();continue;}
        if(line.startsWith('data: ')){
          try{
            var d=JSON.parse(line.slice(6));
            if(lastEvt==='status'){msg.textContent=d.message;}
            if(lastEvt==='complete'){
              title.textContent='Done';
              msg.textContent='Loading your updated report...';
              setTimeout(function(){window.location.reload();},700);
            }
            if(lastEvt==='error'){
              title.textContent='Could not re-analyse';
              msg.textContent=d.message;
              setTimeout(function(){overlay.classList.remove('on');btn.disabled=false;},2500);
            }
          }catch(e){}
          lastEvt=null;
        }
      }
    }
  }catch(e){
    title.textContent='Error';
    msg.textContent=e.message;
    setTimeout(function(){overlay.classList.remove('on');btn.disabled=false;},2500);
  }
}

/* ═══ Section renderers ═══════════════════════════════════════════════════ */
function sideNav(current){
  var r=reportData||{};
  var issuesCount=(r.trust_breakpoints||[]).length;
  var imgsFlagged=((r.imageVerification||{}).stockImages||[]).length+((r.imageVerification||{}).duplicatedImages||[]).length;

  var items=[
    {id:'overview',label:'Overview'},
    {id:'snapshot',label:'Snapshot'},
    {id:'issues',label:'Issues',badge:issuesCount,badgeClass:issuesCount>0?'bad':''},

/* Reposition the SlideTabs cursor behind the active tab */
function positionSlideCursor(activeId) {
  var wrap = document.getElementById('slideTabs');
  if (!wrap) return;
  var active = wrap.querySelector('[data-tab-id="'+activeId+'"]');
  var cursor = document.getElementById('slideCursor');
  if (!active || !cursor) return;
  var rect = active.getBoundingClientRect();
  var wrapRect = wrap.getBoundingClientRect();
  cursor.style.left = (active.offsetLeft) + 'px';
  cursor.style.width = rect.width + 'px';
  cursor.classList.add('visible');

  /* Scroll tab into view horizontally on smaller screens */
  var outer = document.getElementById('slideTabsWrap');
  if (outer && outer.scrollWidth > outer.clientWidth) {
    var targetScroll = active.offsetLeft - (outer.clientWidth / 2) + (rect.width / 2);
    outer.scrollTo({ left: Math.max(0, targetScroll), behavior: 'smooth' });
  }
}

/* Hover = slide to hovered tab; on leave, slide back to active */
function setupSlideTabsHover(activeId) {
  var wrap = document.getElementById('slideTabs');
  if (!wrap) return;
  var cursor = document.getElementById('slideCursor');
  var tabs = wrap.querySelectorAll('.slide-tab[data-tab-id]');
  tabs.forEach(function(t) {
    t.addEventListener('mouseenter', function() {
      var r = t.getBoundingClientRect();
      cursor.style.left = t.offsetLeft + 'px';
      cursor.style.width = r.width + 'px';
    });
  });
  wrap.addEventListener('mouseleave', function() {
    positionSlideCursor(activeId);
  });
}

function navigate(e,id){
  e.preventDefault();
  var url='/report/'+REPORT_ID+(id==='overview'?'':'/'+id);
  history.pushState({},'',url);
  renderSection(id);
  window.scrollTo({top:0,behavior:'smooth'});
  return false;
}

window.addEventListener('popstate',function(){
  var parts=window.location.pathname.split('/').filter(Boolean);
  renderSection(parts[2]||'overview');
});

/* Keep the SlideTabs cursor aligned on window resize */
(function(){
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      var parts = window.location.pathname.split('/').filter(Boolean);
      positionSlideCursor(parts[2] || 'overview');
    }, 100);
  });
})();

function renderSection(section){
  var main=document.getElementById('mainArea');
  var layout='<div class="report-layout-tabs">'+sideNav(section)+'<div class="report-main" id="sectionBody"></div></div>';
  main.innerHTML=layout;

  var body=document.getElementById('sectionBody');
  var r=reportData||{};

  switch(section){
    case 'snapshot': body.innerHTML=renderSnapshot(r); break;
    case 'issues': body.innerHTML=renderIssues(r); break;
    case 'journey': body.innerHTML=renderJourney(r); break;
    case 'images': body.innerHTML=renderImages(r); break;
    case 'competitors': body.innerHTML=renderCompetitors(r); break;
    case 'actions': body.innerHTML=renderActions(r); break;
    default: body.innerHTML=renderOverview(r);
  }

  setupReveal(body);
  animateScores(body);

  /* Position the SlideTabs cursor + wire up hover, after DOM is in place */
  setTimeout(function() {
    positionSlideCursor(section);
    setupSlideTabsHover(section);
  }, 20);

  /* Re-scan new headings for blur-in effect (since content was injected dynamically) */
  if (window.rescanTextEffect) window.rescanTextEffect();
}

function animateScores(root){
  setTimeout(function(){
    var ringCircle=root.querySelector('.ring-wrap svg circle:nth-child(2)');
    if(ringCircle){
      var targetOffset=ringCircle.getAttribute('stroke-dashoffset');
      ringCircle.setAttribute('stroke-dashoffset','283');
      void ringCircle.getBoundingClientRect();
      requestAnimationFrame(function(){ringCircle.setAttribute('stroke-dashoffset',targetOffset);});
    }
    var ringNum=root.querySelector('.ring-num');
    if(ringNum){
      var target=parseInt(ringNum.textContent,10);
      if(!isNaN(target))countUp(ringNum,0,target,1400);
    }
    root.querySelectorAll('.tq-score').forEach(function(el){
      var t=parseInt(el.textContent,10);
      if(!isNaN(t))countUp(el,0,t,900);
    });
  },150);
}

function imageCard(img,type,badgeLabel,impactText){

  var cardClass=isOverridden?'iv-card overridden':'iv-card';

  var html='<div class="'+cardClass+'" data-src="'+safeSrc+'">';
  html+='<div class="iv-thumb" onclick="openLightbox(\''+safeSrc.replace(/'/g,"\\'")+'\',\''+esc(badgeLabel).replace(/'/g,"\\'")+'\')" style="cursor:zoom-in">';
  html+='<div class="iv-thumb-fallback">\u25A1</div>';
  html+='<img src="'+safeSrc+'" alt="Flagged image" loading="lazy" onerror="this.style.display=\'none\'" onload="this.previousElementSibling.style.display=\'none\'">';
  html+='<div class="iv-thumb-overlay '+type+'">'+overlayLabel+'</div>';
  html+='</div>';
  html+='<div class="iv-body">';
  html+='<div class="iv-card-head" style="margin-bottom:6px"><span class="iv-badge '+badgeClass+'">'+esc(badgeLabel)+'</span>';
  if(img.subject)html+='<span style="font-size:11px;color:var(--slate-text);margin-left:8px">\u00B7 '+esc(img.subject)+'</span>';
  html+='</div>';
  html+='<div class="iv-source"><b>'+(type==='stock'?'Found on:':'Appears on:')+'</b> '+esc(img.reason||'')+'</div>';

  /* Matched sites list for duplicates */
  if(img.matchedSites&&img.matchedSites.length>0){
    html+='<div class="iv-matches">';
    html+='<div class="iv-matches-title">Found on these websites:</div>';
    img.matchedSites.slice(0,5).forEach(function(site){
      var host=site.hostname||site;
      var url=site.url||site;
      html+='<a href="'+esc(url)+'" target="_blank" rel="noopener" class="iv-match-link">\u2197 '+esc(host)+'</a>';
    });
    html+='</div>';
  } else if(img.source){
    html+='<div class="iv-matches"><div class="iv-matches-title">Source:</div><a href="'+esc(img.source)+'" target="_blank" rel="noopener" class="iv-match-link">\u2197 '+esc(img.source.length>60?img.source.slice(0,60)+'\u2026':img.source)+'</a></div>';
  }

  html+='<div class="iv-impact">'+esc(impactText)+'</div>';

  /* Override toggle */
  html+='<div class="iv-override">';
  html+='<div class="iv-override-label"><b>This is actually our photo</b><br><span style="font-size:11px;color:var(--slate-text)">Toggle on to remove this flag and update your score</span></div>';
  html+='<button class="'+toggleClass+'" aria-label="Override this flag" onclick="toggleOverride(\''+srcKey.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\',this)"></button>';
  html+='</div>';

  html+='</div></div>';
  return html;
}

var debounceTimer=null;
var debounceSeconds=3;
var debounceCountdown=null;

async function toggleOverride(imageSrc, btn){
  var wasOn=btn.classList.contains('on');
  var newDecision=wasOn?null:'rejected';

  /* Optimistic UI update */
  btn.classList.toggle('on');
  var card=btn.closest('.iv-card');
  if(card)card.classList.toggle('overridden');
  reportOverrides[imageSrc]=newDecision;
  updateImageCountsLocally();

  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/override',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageSrc:imageSrc,decision:newDecision})
    });
    if(!res.ok){
      var errText=await res.text();
      throw new Error('Server returned '+res.status+': '+errText.slice(0,100));
    }
    var data=await res.json();

    if(typeof data.adjustedScore==='number'){
      updateScoreDisplay(data.adjustedScore, currentScore);
      currentScore=data.adjustedScore;
    }

    /* Kick off debounced re-analysis */
    scheduleFullReanalysis();
  }catch(e){
    console.error('Override error:',e);
    btn.classList.toggle('on');
    if(card)card.classList.toggle('overridden');
    reportOverrides[imageSrc]=wasOn?'rejected':null;
    updateImageCountsLocally();
    alert('Could not save your change: '+e.message);
  }
}

function scheduleFullReanalysis(){
  /* Clear any existing timer */
  if(debounceTimer){clearTimeout(debounceTimer);}
  if(debounceCountdown){clearInterval(debounceCountdown);}

  var banner=document.getElementById('updateBanner');
  var bannerText=document.getElementById('updateBannerText');
  var cancelBtn=document.getElementById('updateBannerCancel');
  banner.className='update-banner show';
  banner.querySelector('.dot').style.display='inline-block';
  cancelBtn.style.display='inline-block';

  var remaining=debounceSeconds;
  bannerText.textContent='Your report will update based on your changes in '+remaining+' seconds';

  debounceCountdown=setInterval(function(){
    remaining--;
    if(remaining>0){
      bannerText.textContent='Your report will update based on your changes in '+remaining+' second'+(remaining===1?'':'s');
    }
  },1000);

  debounceTimer=setTimeout(function(){
    clearInterval(debounceCountdown);
    runFullReanalysis();
  },debounceSeconds*1000);
}

function cancelDebounce(){
  if(debounceTimer){clearTimeout(debounceTimer);debounceTimer=null;}
  if(debounceCountdown){clearInterval(debounceCountdown);debounceCountdown=null;}
  var banner=document.getElementById('updateBanner');
  banner.classList.remove('show');
}

async function runFullReanalysis(){
  var banner=document.getElementById('updateBanner');
  var bannerText=document.getElementById('updateBannerText');
  var cancelBtn=document.getElementById('updateBannerCancel');

  banner.className='update-banner show';
  banner.querySelector('.dot').style.display='none';
  cancelBtn.style.display='none';
  bannerText.innerHTML='<span class="spinner-mini"></span> <span>Updating your full report based on your changes...</span>';

  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/reanalyze',{method:'POST'});
    var reader=res.body.getReader(),dec=new TextDecoder(),buf='';
    var success=false;var errorMsg=null;
    while(true){
      var r=await reader.read();
      if(r.done)break;
      buf+=dec.decode(r.value,{stream:true});
      var lines=buf.split('\n');
      buf=lines.pop();
      var lastEvt=null;
      for(var i=0;i<lines.length;i++){
        var line=lines[i];
        if(line.startsWith('event: ')){lastEvt=line.slice(7).trim();continue;}
        if(line.startsWith('data: ')){
          try{
            var d=JSON.parse(line.slice(6));
            if(lastEvt==='complete')success=true;
            if(lastEvt==='error')errorMsg=d.message;
          }catch(e){}
          lastEvt=null;
        }
      }
    }

    if(success){
      /* Fetch the new report data and soft-refresh the current section */
      var dataRes=await fetch('/api/report/'+REPORT_ID+'/data');
      var data=await dataRes.json();
      if(!data.locked){
        reportData=data.report;
        reportOverrides=data.overrides||{};
        currentScore=(reportData&&reportData.hero&&reportData.hero.score)||currentScore;

        /* Update the top nav score */
        var navScoreEl=document.getElementById('navScoreNum');
        if(navScoreEl&&reportData.hero){
          navScoreEl.textContent=reportData.hero.score;
        }

        /* Re-render the currently visible section */
        var parts=window.location.pathname.split('/').filter(Boolean);
        var currentSection=parts[2]||'overview';
        renderSection(currentSection);

        /* Show success banner */
        banner.className='update-banner show success';
        bannerText.innerHTML='<span class="dot"></span> <span>Your report has been fully updated</span>';
        setTimeout(function(){banner.classList.remove('show');},3500);
      }
    } else {
      banner.className='update-banner show error';
      bannerText.innerHTML='<span class="dot"></span> <span>Could not update report: '+(errorMsg||'unknown error')+'</span>';
      setTimeout(function(){banner.classList.remove('show');},5000);
    }
  }catch(e){
    banner.className='update-banner show error';
    bannerText.innerHTML='<span class="dot"></span> <span>Update failed: '+e.message+'</span>';
    setTimeout(function(){banner.classList.remove('show');},5000);
  }
}

/* Update the stock / duplicate counters by counting what is NOT overridden */
function updateImageCountsLocally(){
  if(!reportData||!reportData.imageVerification)return;
  var iv=reportData.imageVerification;
  var activeStock=(iv.stockImages||[]).filter(function(i){return reportOverrides[i.src]!=='rejected';}).length;
  var activeDup=(iv.duplicatedImages||[]).filter(function(i){return reportOverrides[i.src]!=='rejected';}).length;
  var stockEl=document.getElementById('ivStockCount');
  var dupEl=document.getElementById('ivDupCount');
  if(stockEl)stockEl.textContent=activeStock;
  if(dupEl)dupEl.textContent=activeDup;
}

function updateScoreDisplay(newScore, oldScore){
  /* Update top nav score chip if present */
  var chip=document.getElementById('navScoreNum');
  if(chip){
    countUp(chip,oldScore,newScore,500);
    var parent=chip.parentElement;
    if(parent){
      parent.classList.add('score-adjusting');
      setTimeout(function(){parent.classList.remove('score-adjusting');},600);
    }
  }

  /* Also update the big ring number if we are on the overview section */
  var ringNum=document.querySelector('.ring-num');
  if(ringNum){
    countUp(ringNum,oldScore,newScore,800);
  }

  /* Also update the ring circle itself */
  var ringCircle=document.querySelector('.ring-wrap svg circle:nth-child(2)');
  if(ringCircle){
    var r=parseFloat(ringCircle.getAttribute('r'))||45;
    var circ=2*Math.PI*r;
    var offset=circ*(1-newScore/100);
    var col=newScore>=70?'#059669':newScore>=45?'#FFB020':'#FF2E2E';
    ringCircle.setAttribute('stroke-dashoffset',offset.toFixed(1));
    ringCircle.setAttribute('stroke',col);
  }

  /* Show delta pill */
  var delta=newScore-oldScore;
  if(chip&&chip.parentElement&&delta!==0){
    var existing=document.querySelector('.score-chip-delta');
    if(existing)existing.remove();
    var deltaEl=document.createElement('span');
    deltaEl.className='score-chip-delta';
    deltaEl.textContent=(delta>0?'+':'')+delta;
    chip.parentElement.appendChild(deltaEl);
    requestAnimationFrame(function(){deltaEl.classList.add('show');});
    setTimeout(function(){deltaEl.classList.remove('show');setTimeout(function(){if(deltaEl.parentElement)deltaEl.remove();},400);},2000);
  }
}

function openLightbox(src,caption){
  var existing=document.getElementById('ivLightbox');
  if(existing)existing.remove();
  var lb=document.createElement('div');
  lb.id='ivLightbox';
  lb.className='iv-lightbox on';
  lb.innerHTML='<button class="iv-lightbox-close" onclick="closeLightbox()" aria-label="Close">\u2715</button>'+
    '<img src="'+esc(src)+'" alt="Full image">'+
    '<div class="iv-lightbox-caption">'+esc(caption)+'</div>';
  lb.addEventListener('click',function(e){if(e.target===lb)closeLightbox();});
  document.body.appendChild(lb);
  document.addEventListener('keydown',lightboxKeyHandler);
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  var lb=document.getElementById('ivLightbox');
  if(lb)lb.remove();
  document.removeEventListener('keydown',lightboxKeyHandler);
  document.body.style.overflow='';
}
function lightboxKeyHandler(e){if(e.key==='Escape')closeLightbox();}

  html+='<div style="position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,92,51,.18),transparent 70%);pointer-events:none"></div>';

  html+='<div style="font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--coral);font-weight:700;margin-bottom:10px">Don\'t want to do this yourself?</div>';
  html+='<div style="font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px;line-height:1.2">Our team can handle every fix on this list</div>';

  html+='<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap"><button class="service-card-btn" style="background:var(--coral);font-size:14px;padding:12px 22px" onclick="openEnquiry(\'managed_service\',\''+mNoteEsc+'\')">Enquire about done-for-you \u2192</button>';

  html+='</div></div>';

  return html;

<div class="enquiry-modal" id="enquiryModal" onclick="if(event.target===this)closeEnquiry()">

<script>
var SERVICE_LABELS = {
  web_rebuild: 'Web design / rebuild',
  seo: 'SEO services',
  photography: 'Professional photography',
  testimonials: 'Testimonial & review gathering',
  managed_service: 'Full done-for-you fix',
};

var SERVICE_PRICES = {
  web_rebuild: '£1.5k–6k typical',
  seo: '£400–1.2k per month',
  photography: '£450–1.5k per shoot',
  testimonials: '£600–1.8k project',
  managed_service: '£3k–15k depending on scope',
};

var _currentEnquiryService = null;

function openEnquiry(service, contextNote){
  _currentEnquiryService = service;
  var label = SERVICE_LABELS[service] || service;
  var price = SERVICE_PRICES[service] || '';
  var prefilled = contextNote ? contextNote : '';

  /* Check if logged in before showing form */
  fetch('/api/auth/me', {credentials:'include'}).then(function(r){return r.json();}).then(function(d){
    var modal = document.getElementById('enquiryModal');
    var box = document.getElementById('enquiryBox');

      box.innerHTML =
        '<div class="enquiry-eyebrow">Quick account needed</div>'+
        '<div class="enquiry-title">Create an account to enquire</div>'+
        '<div class="enquiry-sub">We need a few details about your business so our team can prepare a proper quote and follow up properly.</div>'+
        '<div class="enquiry-login-prompt">Have an account? <a href="/login?next='+encodeURIComponent(window.location.pathname)+'">Log in</a> or <a href="/signup">sign up</a>.</div>'+
        '<div class="enquiry-actions"><button class="enquiry-cancel" onclick="closeEnquiry()">Cancel</button><a href="/signup" class="enquiry-submit" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center">Create account →</a></div>';
    } else {
      box.innerHTML =
        '<div class="enquiry-eyebrow">Service enquiry</div>'+
        '<div class="enquiry-title">'+esc(label)+'</div>'+
        '<div class="enquiry-sub">Tell us a bit about what you need. One of our forensics team will reply within 1 business day.</div>'+
        (price ? '<div class="enquiry-price"><b>Typical range:</b> '+esc(price)+'. Final quote depends on scope after our discovery call.</div>' : '')+
        '<label class="enquiry-label" for="enqNotes">Your notes</label>'+
        '<textarea class="enquiry-textarea" id="enqNotes" placeholder="e.g. which issue in the report prompted this, your timeline, budget if known...">'+esc(prefilled)+'</textarea>'+
        '<div class="enquiry-actions"><button class="enquiry-cancel" onclick="closeEnquiry()">Cancel</button><button class="enquiry-submit" id="enqSubmitBtn" onclick="submitEnquiry()">Send enquiry →</button></div>';
    }
    modal.classList.add('on');

    alert('Could not load form: '+e.message);

}

async function submitEnquiry(){
  var btn = document.getElementById('enqSubmitBtn');
  var notes = document.getElementById('enqNotes').value.trim();
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    var res = await fetch('/api/enquiry', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({
        service: _currentEnquiryService,
        notes: notes,
        auditId: REPORT_ID,
      })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Send failed');

    document.getElementById('enquiryBox').innerHTML =
      '<div class="enquiry-success">'+
        '<div class="enquiry-success-icon">✓</div>'+
        '<div class="enquiry-title">Enquiry sent</div>'+
        '<div class="enquiry-sub">We have emailed you a confirmation. Our forensics team will be in touch within 1 business day.</div>'+
        '<div class="enquiry-actions"><button class="enquiry-submit" onclick="closeEnquiry()">Close</button></div>'+
      '</div>';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Send enquiry →';
    alert('Could not send: ' + e.message);
  }
}

function closeEnquiry(){
  document.getElementById('enquiryModal').classList.remove('on');
}

/* Infer which service best fits a trust-breakpoint title/evidence */
function inferServiceFromIssue(issue){
  var text = ((issue.title||'') + ' ' + (issue.evidence||'') + ' ' + (issue.fix||'')).toLowerCase();
  if (/\bphot|image|stock|visual|gallery|picture\b/.test(text)) return 'photography';
  if (/\breview|testimonial|google|trustpilot|checkatrade|houzz|recommend\b/.test(text)) return 'testimonials';
  if (/\bseo|search|google rank|ranking|keyword|traffic|visibility|google business\b/.test(text)) return 'seo';
  return 'web_rebuild';  /* default: site-wide trust/content issue */
}

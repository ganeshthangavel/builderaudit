<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit report — BuilderAudit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
<style>
/* Report-specific styles */
.report-nav { background: #fff; border-bottom: 1px solid var(--ice); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px); background: rgba(255,255,255,.95); }
.report-nav-inner { max-width: 1100px; margin: 0 auto; padding: .85rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
.report-back { font-size: 13px; color: var(--slate-text); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; transition: color .2s; }
.report-back:hover { color: var(--ink); }
.report-domain { font-size: 13px; color: var(--ink); font-weight: 600; letter-spacing: -.01em; }
.report-domain-meta { font-size: 11px; color: var(--slate-text); margin-top: 1px; }
.report-score-chip { margin-left: auto; display: flex; align-items: center; gap: 10px; padding: 6px 14px; background: var(--ink); border-radius: 99px; color: #fff; font-weight: 600; font-size: 13px; }
.score-chip-num { font-size: 17px; font-weight: 700; }
.score-chip-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; opacity: .7; }

.side-nav { background: #fff; border: 1px solid var(--ice); border-radius: 14px; padding: .75rem; margin-bottom: 1.25rem; box-shadow: 0 2px 6px -2px rgba(15,23,42,.05); }
.side-nav-title { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--slate-text); font-weight: 600; padding: 6px 10px 4px; }
.side-nav a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; text-decoration: none; color: var(--slate-deep); font-size: 13.5px; border-radius: 8px; transition: background .15s, color .15s; font-weight: 500; }
.side-nav a:hover { background: var(--mist); color: var(--ink); }
.side-nav a.active { background: var(--azure-tint); color: var(--azure-deep); font-weight: 600; }
.side-nav-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.side-nav-badge { margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 99px; background: var(--red-tint); color: var(--red-ink); font-weight: 600; }
.side-nav-badge.ok { background: var(--green-light); color: #065F46; }

.report-layout { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 5rem; display: grid; grid-template-columns: 240px 1fr; gap: 1.5rem; align-items: start; }
.report-layout > .side-nav { position: sticky; top: 80px; }
.report-main { min-width: 0; }

@media (max-width: 900px) {
  .report-layout { grid-template-columns: 1fr; }
  .report-layout > .side-nav { position: static; }
  .side-nav { display: flex; flex-wrap: wrap; padding: .5rem; gap: 2px; }
  .side-nav-title { display: none; }
  .side-nav a { font-size: 12px; padding: 6px 10px; }
  .side-nav-badge { display: none; }
}

/* Lock screen */
.lock-screen { max-width: 520px; margin: 4rem auto; background: #fff; border: 1px solid var(--ice); border-radius: 16px; padding: 2.5rem 2rem; text-align: center; box-shadow: 0 12px 40px -12px rgba(15,23,42,.1); }
.lock-preview { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--mist); }
.lock-score { font-size: 64px; font-weight: 700; letter-spacing: -.04em; line-height: 1; margin-bottom: 8px; }
.lock-company { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.lock-url { font-size: 12px; color: var(--slate-text); font-family: monospace; }
.lock-headline { font-size: 20px; font-weight: 700; margin-bottom: 10px; letter-spacing: -.02em; }
.lock-sub { font-size: 14px; color: var(--slate-deep); line-height: 1.6; margin-bottom: 1.5rem; }
.lock-input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--ice); border-radius: 10px; font-size: 15px; font-family: var(--font); outline: none; transition: border-color .2s; margin-bottom: 10px; }
.lock-input:focus { border-color: var(--azure); }
.lock-btn { width: 100%; padding: 14px; background: var(--coral); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity .2s, transform .15s; }
.lock-btn:hover { opacity: .9; transform: translateY(-1px); }
.lock-btn:disabled { opacity: .5; }
.lock-fineprint { font-size: 11px; color: var(--slate-text); margin-top: 12px; line-height: 1.5; }

/* Section page chrome */
.sp-header { margin-bottom: 1.5rem; }
.sp-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--azure); font-weight: 700; margin-bottom: 6px; }
.sp-title { font-size: 28px; font-weight: 700; letter-spacing: -.025em; line-height: 1.15; margin-bottom: 8px; }
.sp-sub { font-size: 15px; color: var(--slate-deep); line-height: 1.5; max-width: 600px; }

.section-divider { height: 1px; background: var(--ice); margin: 2rem 0; }

/* Re-analyse button and overlay */
.reanalyze-btn { margin-left: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; background: var(--azure); color: #fff; border: none; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; }
.reanalyze-btn:hover { background: var(--azure-deep); transform: translateY(-1px); box-shadow: 0 6px 14px -4px rgba(47,107,255,.4); }
.reanalyze-btn:disabled { opacity: .5; cursor: not-allowed; }
.reanalyze-btn.disabled { background: var(--slate); cursor: not-allowed; }

.reanalyze-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.85); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
.reanalyze-overlay.on { display: flex; }
.reanalyze-box { background: var(--ink); border-radius: 16px; padding: 2rem 2.5rem; text-align: center; max-width: 420px; border: 1px solid rgba(255,255,255,.1); }
.reanalyze-box .scan-core { width: 80px; height: 80px; margin: 0 auto 1.5rem; }
.reanalyze-box .scan-core svg { width: 80px; height: 80px; }
.reanalyze-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; letter-spacing: -.01em; }
.reanalyze-msg { font-size: 14px; color: var(--slate); line-height: 1.5; }


/* Debounced update indicator — subtle bar below the top nav */
.update-banner{display:none;background:var(--azure-tint);border-bottom:1px solid var(--ice);padding:10px 1.5rem;font-size:13px;color:var(--azure-deep);text-align:center;position:sticky;top:60px;z-index:49;backdrop-filter:blur(6px)}
.update-banner.show{display:flex;align-items:center;justify-content:center;gap:8px}
.update-banner.success{background:#D1FAE5;color:#065F46}
.update-banner.error{background:var(--red-tint);color:var(--red-ink)}
.update-banner .dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulseDot 1.2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
.update-banner.success .dot,.update-banner.error .dot{animation:none;opacity:1}
.update-banner .spinner-mini{width:12px;height:12px;border:1.5px solid rgba(47,107,255,.3);border-top-color:var(--azure);border-radius:50%;animation:spin .7s linear infinite}
.update-banner button{background:none;border:none;color:currentColor;font-size:12px;font-weight:600;cursor:pointer;padding:2px 8px;margin-left:4px;text-decoration:underline;opacity:.8}
.update-banner button:hover{opacity:1}

</style>
</head>
<body>

<div class="report-nav" id="reportNav" style="display:none">
  <div class="report-nav-inner">
    <a href="/" class="report-back">&larr; Home</a>
    <div>
      <div class="report-domain" id="navDomain">—</div>
      <div class="report-domain-meta" id="navDate">—</div>
    </div>
    <div class="report-score-chip" id="navScore" style="display:none">
      <span class="score-chip-label">Score</span>
      <span class="score-chip-num" id="navScoreNum">—</span>
    </div>
  </div>
</div>

<div class="update-banner" id="updateBanner">
  <span class="dot"></span>
  <span id="updateBannerText">Your report will update based on your changes in 3 seconds</span>
  <button onclick="cancelDebounce()" id="updateBannerCancel">Cancel</button>
</div>

<main id="mainArea">
  <div class="scan-stage active" style="padding-top:5rem">
    <div class="scan-core">
      <div class="scan-ring scan-ring-1"></div>
      <div class="scan-ring scan-ring-2"></div>
      <div class="scan-ring scan-ring-3"></div>
      <div class="scan-center">&#9712;</div>
    </div>
    <div class="scan-phase">Loading</div>
    <div class="scan-message">Fetching your report...</div>
  </div>
</main>

<script>
/* ═══ Report shell ═══════════════════════════════════════════════════════════
   This page handles /report/:id and /report/:id/:section.
   On load: fetch /api/report/:id/data
   If locked: show email gate.
   If unlocked: load the requested section.
══════════════════════════════════════════════════════════════════════════════ */

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var pathParts = window.location.pathname.split('/').filter(Boolean);
var REPORT_ID = pathParts[1];
var SECTION = pathParts[2] || 'overview';

var reportData = null;
var reportOverrides = {};
var currentScore = 0;

function sc(n){return n>=70?'g':n>=45?'a':'r'}
function cc(n){return 'c-'+sc(n)}
function fc(n){return 'f-'+sc(n)}
function stageLabel(s){return{first_impression:'First impression',scrolling:'As they scroll',decision_moment:'Decision moment'}[s]||s}
function impactPill(i){return '<span class="bp-pill pill-'+(i||'medium')+'">'+esc(i)+'</span>'}

function ringPath(score,size){
  size=size||88;
  var r=size*0.386, circ=2*Math.PI*r, offset=circ*(1-score/100);
  var col=score>=70?'#059669':score>=45?'#FFB020':'#FF2E2E';
  var cx=size/2, cy=size/2;
  return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#1E293B" stroke-width="7"/>' +
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="7" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'" stroke-linecap="round" transform="rotate(-90 '+cx+' '+cy+')"/>';
}

function countUp(el,from,to,duration){
  var start=performance.now();
  function tick(now){
    var t=Math.min(1,(now-start)/duration);
    var eased=1-Math.pow(1-t,3);
    el.textContent=Math.round(from+(to-from)*eased);
    if(t<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function setupReveal(root){
  var selectors=['.bs-section','.score-band','.journey-list','.bp-list','.tq-list','.feed-list','.photo-cols','.gap-card','.actions-wrap','.iv-summary','.iv-list','.iv-none','.bs-grid','.bs-header','.bs-gaps','.sp-header'];
  selectors.forEach(function(sel){
    root.querySelectorAll(sel).forEach(function(el){
      el.classList.add('reveal');
      if(el.children.length>1&&(sel==='.journey-list'||sel==='.bp-list'||sel==='.tq-list'||sel==='.bs-grid'||sel==='.iv-list')){
        el.classList.add('stagger');
      }
    });
  });
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.classList.add('shown');
        io.unobserve(entry.target);
      }
    });
  },{threshold:.08,rootMargin:'0px 0px -40px 0px'});
  root.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
}

/* ═══ Initial load ═══ */
(async function init(){
  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/data');
    if(!res.ok){
      if(res.status===404){showNotFound();return;}
      throw new Error('Could not load report');
    }
    var data=await res.json();
    if(data.locked){
      showLockScreen(data);
    } else {
      reportData=data.report;
      reportOverrides=data.overrides||{};
      currentScore=(reportData&&reportData.hero&&reportData.hero.score)||0;
      showTopNav(data);
      renderSection(SECTION);
    }
  }catch(e){
    document.getElementById('mainArea').innerHTML='<div style="max-width:600px;margin:4rem auto"><div class="error-card">Error: '+esc(e.message)+'</div></div>';
  }
})();

function showNotFound(){
  document.getElementById('mainArea').innerHTML='<div style="max-width:520px;margin:5rem auto;text-align:center;padding:3rem 2rem;background:#fff;border:1px solid var(--ice);border-radius:16px">'+
    '<h1 style="font-size:24px;font-weight:700;margin-bottom:10px">Report not found</h1>'+
    '<p style="color:var(--slate-deep);margin-bottom:1.5rem">This audit link is invalid or the report has expired.</p>'+
    '<a href="/audit" class="hero-cta" style="display:inline-flex;background:var(--coral);color:#fff;padding:12px 22px;border-radius:10px;text-decoration:none;font-weight:600">Run a new audit &rarr;</a>'+
    '</div>';
}

function showLockScreen(preview){
  var score=preview.score||0;
  var color=sc(score);
  var main=document.getElementById('mainArea');
  var domain='';try{domain=new URL(preview.url).hostname;}catch(e){domain=preview.url;}

  main.innerHTML=
    '<div class="lock-screen">'+
      '<div class="lock-preview">'+
        '<div class="lock-score c-'+color+'">'+score+'</div>'+
        '<div class="lock-company">'+esc(preview.companyName||domain)+'</div>'+
        '<div class="lock-url">'+esc(domain)+'</div>'+
      '</div>'+
      '<div class="lock-headline">'+esc(preview.headline||'Your audit is ready')+'</div>'+
      '<div class="lock-sub">Enter your email to unlock the full forensic report, including every trust breakpoint, verified image analysis, and your personalised action plan.</div>'+
      '<input type="email" class="lock-input" id="lockEmail" placeholder="you@example.co.uk" autofocus>'+
      '<button class="lock-btn" id="lockBtn" onclick="unlock()">Unlock my report &rarr;</button>'+
      '<div class="lock-fineprint">We will only use your email to send you this report and occasional relevant updates. You can unsubscribe at any time.</div>'+
    '</div>';

  document.getElementById('lockEmail').addEventListener('keydown',function(e){
    if(e.key==='Enter')unlock();
  });
}

async function unlock(){
  var email=document.getElementById('lockEmail').value.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    alert('Please enter a valid email address');return;
  }
  var btn=document.getElementById('lockBtn');
  btn.disabled=true;btn.textContent='Unlocking...';
  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/unlock',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email})
    });
    if(!res.ok)throw new Error((await res.json()).error||'Unlock failed');
    /* Reload to show unlocked content */
    window.location.reload();
  }catch(e){
    btn.disabled=false;btn.textContent='Unlock my report \u2192';
    alert('Error: '+e.message);
  }
}

function showTopNav(data){
  var nav=document.getElementById('reportNav');
  nav.style.display='block';
  var domain='';try{domain=new URL(data.url).hostname;}catch(e){domain=data.url;}
  document.getElementById('navDomain').textContent=domain;
  var date=new Date(data.scannedAt).toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'});
  document.getElementById('navDate').textContent='Audited '+date;
  if(data.report&&data.report.hero){
    document.getElementById('navScore').style.display='flex';
    document.getElementById('navScoreNum').textContent=data.report.hero.score||'—';
  }
  /* Check if this report supports re-analysis */
  fetchReanalyzeAvailability();
}

async function fetchReanalyzeAvailability(){
  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/meta');
    if(!res.ok)return;
    var meta=await res.json();
    var btn=document.getElementById('reanalyzeBtn');
    if(!btn)return;
    if(meta.canReanalyze){
      btn.style.display='inline-flex';
      if(meta.lastAnalyzedAt){
        var analyzedDate=new Date(meta.lastAnalyzedAt).toLocaleString('en-GB',{dateStyle:'short',timeStyle:'short'});
        btn.title='Last analysed: '+analyzedDate+'. Click to run a fresh AI analysis with the latest prompt and scoring logic.';
      }
    }
  }catch(e){console.warn('Meta check failed:',e);}
}

async function reanalyze(){
  var btn=document.getElementById('reanalyzeBtn');
  var overlay=document.getElementById('reanalyzeOverlay');
  var title=document.getElementById('reanalyzeTitle');
  var msg=document.getElementById('reanalyzeMsg');
  btn.disabled=true;
  overlay.classList.add('on');
  title.textContent='Re-analysing';
  msg.textContent='Loading your stored audit data...';

  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/reanalyze',{method:'POST'});
    var reader=res.body.getReader(),dec=new TextDecoder(),buf='';
    while(true){
      var r=await reader.read();
      if(r.done)break;
      buf+=dec.decode(r.value,{stream:true});
      var lines=buf.split('\n');
      buf=lines.pop();
      var lastEvt=null;
      for(var i=0;i<lines.length;i++){
        var line=lines[i];
        if(line.startsWith('event: ')){lastEvt=line.slice(7).trim();continue;}
        if(line.startsWith('data: ')){
          try{
            var d=JSON.parse(line.slice(6));
            if(lastEvt==='status'){msg.textContent=d.message;}
            if(lastEvt==='complete'){
              title.textContent='Done';
              msg.textContent='Loading your updated report...';
              setTimeout(function(){window.location.reload();},700);
            }
            if(lastEvt==='error'){
              title.textContent='Could not re-analyse';
              msg.textContent=d.message;
              setTimeout(function(){overlay.classList.remove('on');btn.disabled=false;},2500);
            }
          }catch(e){}
          lastEvt=null;
        }
      }
    }
  }catch(e){
    title.textContent='Error';
    msg.textContent=e.message;
    setTimeout(function(){overlay.classList.remove('on');btn.disabled=false;},2500);
  }
}

/* ═══ Section renderers ═══════════════════════════════════════════════════ */
function sideNav(current){
  var r=reportData||{};
  var issuesCount=(r.trust_breakpoints||[]).length;
  var imgsFlagged=((r.imageVerification||{}).stockImages||[]).length+((r.imageVerification||{}).duplicatedImages||[]).length;

  var items=[
    {id:'overview',label:'Overview',icon:'\u25CE'},
    {id:'snapshot',label:'Business snapshot',icon:'\u25A3'},
    {id:'issues',label:'Trust issues',icon:'\u25B2',badge:issuesCount},
    {id:'journey',label:'Homeowner journey',icon:'\u25B6'},
    {id:'images',label:'Image verification',icon:'\u25A0',badge:imgsFlagged},
    {id:'competitors',label:'Vs competitors',icon:'\u25C6'},
    {id:'actions',label:'Action plan',icon:'\u2713'},
  ];

  var html='<nav class="side-nav"><div class="side-nav-title">Report sections</div>';
  items.forEach(function(i){
    var badge='';
    if(i.badge!==undefined&&i.badge>0)badge='<span class="side-nav-badge">'+i.badge+'</span>';
    html+='<a href="/report/'+REPORT_ID+'/'+(i.id==='overview'?'':i.id)+'" class="'+(i.id===current?'active':'')+'" onclick="return navigate(event,\''+i.id+'\')">'+
      '<span class="side-nav-icon">'+i.icon+'</span>'+esc(i.label)+badge+
    '</a>';
  });
  html+='</nav>';
  return html;
}

function navigate(e,id){
  e.preventDefault();
  var url='/report/'+REPORT_ID+(id==='overview'?'':'/'+id);
  history.pushState({},'',url);
  renderSection(id);
  window.scrollTo({top:0,behavior:'smooth'});
  return false;
}

window.addEventListener('popstate',function(){
  var parts=window.location.pathname.split('/').filter(Boolean);
  renderSection(parts[2]||'overview');
});

function renderSection(section){
  var main=document.getElementById('mainArea');
  var layout='<div class="report-layout">'+sideNav(section)+'<div class="report-main" id="sectionBody"></div></div>';
  main.innerHTML=layout;

  var body=document.getElementById('sectionBody');
  var r=reportData||{};

  switch(section){
    case 'snapshot': body.innerHTML=renderSnapshot(r); break;
    case 'issues': body.innerHTML=renderIssues(r); break;
    case 'journey': body.innerHTML=renderJourney(r); break;
    case 'images': body.innerHTML=renderImages(r); break;
    case 'competitors': body.innerHTML=renderCompetitors(r); break;
    case 'actions': body.innerHTML=renderActions(r); break;
    default: body.innerHTML=renderOverview(r);
  }

  setupReveal(body);
  animateScores(body);
}

function animateScores(root){
  setTimeout(function(){
    var ringCircle=root.querySelector('.ring-wrap svg circle:nth-child(2)');
    if(ringCircle){
      var targetOffset=ringCircle.getAttribute('stroke-dashoffset');
      ringCircle.setAttribute('stroke-dashoffset','283');
      void ringCircle.getBoundingClientRect();
      requestAnimationFrame(function(){ringCircle.setAttribute('stroke-dashoffset',targetOffset);});
    }
    var ringNum=root.querySelector('.ring-num');
    if(ringNum){
      var target=parseInt(ringNum.textContent,10);
      if(!isNaN(target))countUp(ringNum,0,target,1400);
    }
    root.querySelectorAll('.tq-score').forEach(function(el){
      var t=parseInt(el.textContent,10);
      if(!isNaN(t))countUp(el,0,t,900);
    });
  },150);
}

/* ═══ Overview ═══ */
function renderOverview(r){
  var score=(r.hero||{}).score||0;
  var color=sc(score);
  var bs=r.business_snapshot||{};

  var html='';
  html+='<div class="sp-header"><div class="sp-eyebrow">Overview</div><h1 class="sp-title">Your audit results</h1><p class="sp-sub">The top-line view. Use the menu on the left to dig into each section.</p></div>';

  /* Score band */
  html+='<div class="score-band">';
  html+='<div class="ring-wrap"><svg viewBox="0 0 112 112">'+ringPath(score,112)+'</svg><div class="ring-num">'+score+'</div></div>';
  html+='<div class="score-copy">';
  html+='<div class="score-hl">'+esc((r.hero||{}).headline||'')+'</div>';
  html+='<div class="score-sub">'+esc((r.hero||{}).subtext||'')+'</div>';
  html+='<div class="ai-voice">'+esc((r.hero||{}).ai_voice_intro||'')+'</div>';
  html+='</div></div>';

  /* Quick stats grid */
  var issuesCount=(r.trust_breakpoints||[]).length;
  var critCount=(r.trust_breakpoints||[]).filter(function(bp){return bp.impact==='critical'||bp.impact==='high';}).length;
  var iv=r.imageVerification||{};

  html+='</div></div>';
  return html;
}

var debounceTimer=null;
var debounceSeconds=3;
var debounceCountdown=null;

async function toggleOverride(imageSrc, btn){
  var wasOn=btn.classList.contains('on');
  var newDecision=wasOn?null:'rejected';

  /* Optimistic UI update */
  btn.classList.toggle('on');
  var card=btn.closest('.iv-card');
  if(card)card.classList.toggle('overridden');
  reportOverrides[imageSrc]=newDecision;
  updateImageCountsLocally();

  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/override',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageSrc:imageSrc,decision:newDecision})
    });
    if(!res.ok){
      var errText=await res.text();
      throw new Error('Server returned '+res.status+': '+errText.slice(0,100));
    }
    var data=await res.json();

    if(typeof data.adjustedScore==='number'){
      updateScoreDisplay(data.adjustedScore, currentScore);
      currentScore=data.adjustedScore;
    }

    /* Kick off debounced re-analysis */
    scheduleFullReanalysis();
  }catch(e){
    console.error('Override error:',e);
    btn.classList.toggle('on');
    if(card)card.classList.toggle('overridden');
    reportOverrides[imageSrc]=wasOn?'rejected':null;
    updateImageCountsLocally();
    alert('Could not save your change: '+e.message);
  }
}

function scheduleFullReanalysis(){
  /* Clear any existing timer */
  if(debounceTimer){clearTimeout(debounceTimer);}
  if(debounceCountdown){clearInterval(debounceCountdown);}

  var banner=document.getElementById('updateBanner');
  var bannerText=document.getElementById('updateBannerText');
  var cancelBtn=document.getElementById('updateBannerCancel');
  banner.className='update-banner show';
  banner.querySelector('.dot').style.display='inline-block';
  cancelBtn.style.display='inline-block';

  var remaining=debounceSeconds;
  bannerText.textContent='Your report will update based on your changes in '+remaining+' seconds';

  debounceCountdown=setInterval(function(){
    remaining--;
    if(remaining>0){
      bannerText.textContent='Your report will update based on your changes in '+remaining+' second'+(remaining===1?'':'s');
    }
  },1000);

  debounceTimer=setTimeout(function(){
    clearInterval(debounceCountdown);
    runFullReanalysis();
  },debounceSeconds*1000);
}

function cancelDebounce(){
  if(debounceTimer){clearTimeout(debounceTimer);debounceTimer=null;}
  if(debounceCountdown){clearInterval(debounceCountdown);debounceCountdown=null;}
  var banner=document.getElementById('updateBanner');
  banner.classList.remove('show');
}

async function runFullReanalysis(){
  var banner=document.getElementById('updateBanner');
  var bannerText=document.getElementById('updateBannerText');
  var cancelBtn=document.getElementById('updateBannerCancel');

  banner.className='update-banner show';
  banner.querySelector('.dot').style.display='none';
  cancelBtn.style.display='none';
  bannerText.innerHTML='<span class="spinner-mini"></span> <span>Updating your full report based on your changes...</span>';

  try{
    var res=await fetch('/api/report/'+REPORT_ID+'/reanalyze',{method:'POST'});
    var reader=res.body.getReader(),dec=new TextDecoder(),buf='';
    var success=false;var errorMsg=null;
    while(true){
      var r=await reader.read();
      if(r.done)break;
      buf+=dec.decode(r.value,{stream:true});
      var lines=buf.split('\n');
      buf=lines.pop();
      var lastEvt=null;
      for(var i=0;i<lines.length;i++){
        var line=lines[i];
        if(line.startsWith('event: ')){lastEvt=line.slice(7).trim();continue;}
        if(line.startsWith('data: ')){
          try{
            var d=JSON.parse(line.slice(6));
            if(lastEvt==='complete')success=true;
            if(lastEvt==='error')errorMsg=d.message;
          }catch(e){}
          lastEvt=null;
        }
      }
    }

    if(success){
      /* Fetch the new report data and soft-refresh the current section */
      var dataRes=await fetch('/api/report/'+REPORT_ID+'/data');
      var data=await dataRes.json();
      if(!data.locked){
        reportData=data.report;
        reportOverrides=data.overrides||{};
        currentScore=(reportData&&reportData.hero&&reportData.hero.score)||currentScore;

        /* Update the top nav score */
        var navScoreEl=document.getElementById('navScoreNum');
        if(navScoreEl&&reportData.hero){
          navScoreEl.textContent=reportData.hero.score;
        }

        /* Re-render the currently visible section */
        var parts=window.location.pathname.split('/').filter(Boolean);
        var currentSection=parts[2]||'overview';
        renderSection(currentSection);

        /* Show success banner */
        banner.className='update-banner show success';
        bannerText.innerHTML='<span class="dot"></span> <span>Your report has been fully updated</span>';
        setTimeout(function(){banner.classList.remove('show');},3500);
      }
    } else {
      banner.className='update-banner show error';
      bannerText.innerHTML='<span class="dot"></span> <span>Could not update report: '+(errorMsg||'unknown error')+'</span>';
      setTimeout(function(){banner.classList.remove('show');},5000);
    }
  }catch(e){
    banner.className='update-banner show error';
    bannerText.innerHTML='<span class="dot"></span> <span>Update failed: '+e.message+'</span>';
    setTimeout(function(){banner.classList.remove('show');},5000);
  }
}

/* Update the stock / duplicate counters by counting what is NOT overridden */
function updateImageCountsLocally(){
  if(!reportData||!reportData.imageVerification)return;
  var iv=reportData.imageVerification;
  var activeStock=(iv.stockImages||[]).filter(function(i){return reportOverrides[i.src]!=='rejected';}).length;
  var activeDup=(iv.duplicatedImages||[]).filter(function(i){return reportOverrides[i.src]!=='rejected';}).length;
  var stockEl=document.getElementById('ivStockCount');
  var dupEl=document.getElementById('ivDupCount');
  if(stockEl)stockEl.textContent=activeStock;
  if(dupEl)dupEl.textContent=activeDup;
}

function updateScoreDisplay(newScore, oldScore){
  /* Update top nav score chip if present */
  var chip=document.getElementById('navScoreNum');
  if(chip){
    countUp(chip,oldScore,newScore,500);
    var parent=chip.parentElement;
    if(parent){
      parent.classList.add('score-adjusting');
      setTimeout(function(){parent.classList.remove('score-adjusting');},600);
    }
  }

  /* Also update the big ring number if we are on the overview section */
  var ringNum=document.querySelector('.ring-num');
  if(ringNum){
    countUp(ringNum,oldScore,newScore,800);
  }

  /* Also update the ring circle itself */
  var ringCircle=document.querySelector('.ring-wrap svg circle:nth-child(2)');
  if(ringCircle){
    var r=parseFloat(ringCircle.getAttribute('r'))||45;
    var circ=2*Math.PI*r;
    var offset=circ*(1-newScore/100);
    var col=newScore>=70?'#059669':newScore>=45?'#FFB020':'#FF2E2E';
    ringCircle.setAttribute('stroke-dashoffset',offset.toFixed(1));
    ringCircle.setAttribute('stroke',col);
  }

  /* Show delta pill */
  var delta=newScore-oldScore;
  if(chip&&chip.parentElement&&delta!==0){
    var existing=document.querySelector('.score-chip-delta');
    if(existing)existing.remove();
    var deltaEl=document.createElement('span');
    deltaEl.className='score-chip-delta';
    deltaEl.textContent=(delta>0?'+':'')+delta;
    chip.parentElement.appendChild(deltaEl);
    requestAnimationFrame(function(){deltaEl.classList.add('show');});
    setTimeout(function(){deltaEl.classList.remove('show');setTimeout(function(){if(deltaEl.parentElement)deltaEl.remove();},400);},2000);
  }
}

function openLightbox(src,caption){
  var existing=document.getElementById('ivLightbox');
  if(existing)existing.remove();
  var lb=document.createElement('div');
  lb.id='ivLightbox';
  lb.className='iv-lightbox on';
  lb.innerHTML='<button class="iv-lightbox-close" onclick="closeLightbox()" aria-label="Close">\u2715</button>'+
    '<img src="'+esc(src)+'" alt="Full image">'+
    '<div class="iv-lightbox-caption">'+esc(caption)+'</div>';
  lb.addEventListener('click',function(e){if(e.target===lb)closeLightbox();});
  document.body.appendChild(lb);
  document.addEventListener('keydown',lightboxKeyHandler);
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  var lb=document.getElementById('ivLightbox');
  if(lb)lb.remove();
  document.removeEventListener('keydown',lightboxKeyHandler);
  document.body.style.overflow='';
}
function lightboxKeyHandler(e){if(e.key==='Escape')closeLightbox();}

/* ═══ Competitors ═══ */
function renderCompetitors(r){
  var cg=r.competitor_gap||{};
  var html='';
  html+='<div class="sp-header"><div class="sp-eyebrow">Vs competitors</div><h1 class="sp-title">How you compare</h1><p class="sp-sub">What better-performing UK builder websites are doing — and what you already do well.</p></div>';
  html+='<div class="gap-card">';
  html+='<div class="gap-summary">'+esc(cg.summary||'')+'</div>';
  html+='<div class="gap-cols">';
  html+='<div class="gap-col gc-bad"><div class="gap-col-head">They have &mdash; you don\'t</div>';
  (cg.they_have||[]).forEach(function(t){html+='<div class="gap-item"><div class="gi-icon">\u2716</div>'+esc(t)+'</div>';});
  html+='</div>';
  html+='<div class="gap-col gc-good"><div class="gap-col-head">You already have</div>';
  (cg.you_have||[]).forEach(function(t){html+='<div class="gap-item"><div class="gi-icon">\u2713</div>'+esc(t)+'</div>';});
  html+='</div></div></div>';
  return html;
}

/* ═══ Actions ═══ */
function renderActions(r){
  var html='';
  html+='<div class="sp-header"><div class="sp-eyebrow">Action plan</div><h1 class="sp-title">Fix these this week</h1><p class="sp-sub">Top '+(r.top_actions||[]).length+' changes ranked by impact on your enquiry rate. Each is specific and achievable within days.</p></div>';
  html+='<div class="actions-wrap">';
  html+='<div class="actions-head">Your prioritised action plan</div>';
  (r.top_actions||[]).forEach(function(a,i){
    html+='<div class="action-row"><div class="a-num">'+(i+1)+'</div><div class="a-text">'+esc(a)+'</div></div>';
  });
  html+='</div>';
  return html;
}

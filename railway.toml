# Railway config — single web service.
# The weekly cron is run via a separate Railway service (created in the UI),
# NOT via [[services]] blocks here. The previous multi-service config was
# starting node src/server.js twice in the same container, causing EADDRINUSE.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node src/server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

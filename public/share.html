<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trust Audit Report — BuilderAudit</title>
<meta name="description" content="A forensic website trust audit by BuilderAudit.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/logo/builderaudit-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/logo/apple-touch-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --fill:#FFD24D; --accent:#5247B8; --surface:#FBF5E1; --ink:#1B1A17; --line:#1B1A17;
    --muted:#5C5851; --green:#1F8A5B; --red:#D9534F; --amber:#D97706;
    --display:'Hanken Grotesk',-apple-system,sans-serif;
    --body:'IBM Plex Sans',-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface);color:var(--ink);font-family:var(--body);line-height:1.6}
  a{color:var(--accent)}
  .wrap{max-width:860px;margin:0 auto;padding:28px 20px 64px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:28px}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:900;font-size:19px;color:var(--ink);text-decoration:none;letter-spacing:-0.01em}
  .brand-word{font-family:var(--display);font-weight:900;font-size:19px;letter-spacing:-0.01em}
  .pill{font-family:var(--body);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;border:1.5px solid var(--line);border-radius:999px;padding:4px 11px;background:#fff}
  .card{background:#fff;border:2.5px solid var(--line);border-radius:14px;box-shadow:6px 6px 0 var(--line);overflow:hidden;margin-bottom:22px}
  .hero-strip{background:var(--fill);border-bottom:2.5px solid var(--line);padding:22px 24px;position:relative}
  .eyebrow{font-family:var(--body);font-size:11px;font-weight:800;color:var(--ink);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;opacity:0.75}
  .hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
  h1{font-family:var(--display);font-weight:900;font-size:27px;line-height:1.05;text-transform:uppercase;letter-spacing:-0.02em;margin:0;max-width:560px}
  .scorechip{flex-shrink:0;transform:rotate(2deg);color:#fff;border:2.5px solid var(--line);border-radius:10px;padding:10px 16px;box-shadow:3px 3px 0 var(--line);text-align:center;min-width:96px}
  .scorechip .n{font-family:var(--display);font-weight:900;font-size:34px;line-height:1}
  .scorechip .l{font-family:var(--body);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-top:3px;opacity:0.92}
  .body{padding:22px 24px}
  .sub{font-family:var(--body);font-size:14.5px;color:var(--ink);margin:0 0 4px}
  .meta{font-family:var(--body);font-size:12.5px;color:var(--muted);margin:6px 0 0}
  h2{font-family:var(--display);font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:-0.01em;margin:0 0 14px}
  .cat{display:grid;grid-template-columns:150px 1fr 34px;gap:12px;align-items:center;margin-bottom:11px}
  .cat .nm{font-family:var(--body);font-size:13px;font-weight:600}
  .bar{height:11px;background:var(--surface);border:1.5px solid var(--line);border-radius:4px;overflow:hidden}
  .bar > div{height:100%}
  .cat .v{font-family:var(--body);font-size:12.5px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
  ul.clean{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
  ul.clean li{display:flex;gap:10px;font-size:13.5px;line-height:1.45;align-items:flex-start}
  .tick{flex:0 0 auto;font-weight:800}
  .action{display:flex;align-items:center;gap:12px;padding:11px 13px;border:2px solid var(--line);border-radius:7px;background:#fff}
  .action.done{background:var(--surface);opacity:0.62}
  .action .ttl{flex:1;font-size:14px;font-weight:600}
  .action .imp{flex:0 0 auto;font-family:var(--display);font-weight:800;font-size:12px;color:#fff;background:var(--green);border:2px solid var(--line);border-radius:999px;padding:4px 11px;white-space:nowrap}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-family:var(--body);font-size:12.5px;font-weight:600;background:var(--surface);border:1.5px solid var(--line);border-radius:999px;padding:5px 12px}
  .kv{display:flex;flex-wrap:wrap;gap:18px 28px;margin-bottom:4px}
  .kv .item{min-width:120px}
  .kv .k{font-family:var(--body);font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2px}
  .kv .v{font-family:var(--display);font-weight:800;font-size:15px;color:var(--ink)}
  .bp{border:2px solid var(--line);border-radius:9px;padding:13px 15px;margin-bottom:10px;background:#fff}
  .bp .t{font-family:var(--display);font-weight:800;font-size:14.5px;margin-bottom:5px}
  .bp .r{font-family:var(--body);font-size:13px;color:var(--muted);font-style:italic;margin-bottom:6px;line-height:1.45}
  .bp .f{font-family:var(--body);font-size:13px;line-height:1.45}
  .bp .f b{color:var(--accent)}
  .voice{background:var(--accent);color:#fff;border:2.5px solid var(--line);border-radius:12px;box-shadow:5px 5px 0 var(--line);padding:20px 22px;margin-bottom:22px;font-family:var(--body);font-size:15px;line-height:1.6}
  .voice .lbl{font-family:var(--body);font-size:10.5px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;opacity:0.7;margin-bottom:8px}
  .comp{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;border:2px solid var(--line);border-radius:9px;padding:13px 15px;margin-bottom:10px;background:#fff}
  .comp.you{background:var(--fill)}
  .comp .nm{font-family:var(--display);font-weight:800;font-size:15px}
  .comp .u{font-family:var(--body);font-size:12px;color:var(--muted);margin-top:2px}
  .comp .sc{font-family:var(--display);font-weight:900;font-size:24px;border:2px solid var(--line);border-radius:7px;padding:6px 12px;min-width:54px;text-align:center;box-shadow:2px 2px 0 var(--line)}
  .rankline{font-family:var(--body);font-size:14px;line-height:1.55;margin:0 0 16px;padding:13px 15px;background:var(--surface);border:1.5px dashed var(--line);border-radius:9px}
  .footer{text-align:center;margin-top:36px;font-family:var(--body);font-size:13px;color:var(--muted)}
  .gl{display:block;font-family:var(--body);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin:0 0 6px}
  .gi{width:100%;font-family:var(--body);font-size:15px;color:var(--ink);border:2px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:14px;background:#fff;outline:none}
  .gi:focus{border-color:var(--accent)}
  .gbtn{width:100%;font-family:var(--body);font-weight:700;font-size:15px;color:#fff;background:var(--accent);border:2px solid var(--line);border-radius:9px;padding:13px 18px;box-shadow:3px 3px 0 var(--line);cursor:pointer}
  .gbtn:disabled{opacity:0.6;cursor:default}
  .cta{display:inline-block;margin-top:10px;background:var(--accent);color:#fff;text-decoration:none;font-family:var(--body);font-weight:700;font-size:14px;border:2px solid var(--line);border-radius:8px;padding:12px 20px;box-shadow:3px 3px 0 var(--line)}
  .state{text-align:center;padding:80px 20px;font-family:var(--body);color:var(--muted)}
  .spinner{width:34px;height:34px;border:4px solid #e4dfc9;border-top:4px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (max-width:560px){
    .wrap{padding:22px 14px 56px}
    h1{font-size:23px}
    .cat{grid-template-columns:104px 1fr 28px;gap:9px}
    .cat .nm{font-size:12px}
    .body,.hero-strip{padding:18px 16px}
    .voice{padding:16px 16px}
    .topbar{margin-bottom:20px}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="/"><svg width="30" height="31" viewBox="0 0 240 248" role="img" aria-label="BuilderAudit" style="display:block;flex:0 0 auto"><rect x="151" y="150" width="30" height="78" rx="15" transform="rotate(-45 166 189)" fill="#1B1A17"/><circle cx="114" cy="152" r="58" fill="#FFFFFF" stroke="#1B1A17" stroke-width="14"/><path d="M86 130 Q75 152 88 176" fill="none" stroke="#D8D5CC" stroke-width="9" stroke-linecap="round"/><rect x="32" y="92" width="164" height="31" rx="15.5" fill="#FFD24D" stroke="#1B1A17" stroke-width="8"/><path d="M62 96 Q62 40 114 40 Q166 40 166 96 Z" fill="#FFD24D" stroke="#1B1A17" stroke-width="8" stroke-linejoin="round"/><rect x="100" y="26" width="28" height="20" rx="5" fill="#FFD24D" stroke="#1B1A17" stroke-width="8"/><path d="M68 86 Q114 97 160 86" fill="none" stroke="#5247B8" stroke-width="9" stroke-linecap="round"/><path d="M114 46 V90" fill="none" stroke="#1B1A17" stroke-width="6" stroke-linecap="round"/><path d="M88 52 Q80 72 86 90" fill="none" stroke="#1B1A17" stroke-width="5.5" stroke-linecap="round"/><path d="M140 52 Q148 72 142 90" fill="none" stroke="#1B1A17" stroke-width="5.5" stroke-linecap="round"/></svg><span class="brand-word"><span>Builder</span><span style="color:var(--accent)">Audit</span></span></a>
      <span class="pill">Shared trust report</span>
    </div>
    <div id="root"><div class="state"><div class="spinner"></div>Loading report…</div></div>
    <div class="footer" id="footer" style="display:none">
      <div>This is a forensic website trust audit produced by BuilderAudit.</div>
      <a class="cta" href="/">Run a free audit on your own site →</a>
    </div>
  </div>

<script>
(function(){
  var token = (location.pathname.split('/r/')[1] || '').replace(/\/$/,'');
  var root = document.getElementById('root');
  var footer = document.getElementById('footer');

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function scoreColor(s){ return s>=75 ? 'var(--green)' : s>=55 ? 'var(--amber)' : 'var(--red)'; }
  function fmtDate(d){ try { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(e){ return ''; } }

  function loadReport(){
    fetch('/api/share/' + encodeURIComponent(token), { credentials:'include' })
      .then(function(r){ return r.ok ? r.json() : r.json().then(function(e){ throw new Error(e.error || 'Not found'); }); })
      .then(function(d){
        if (d && d.gated) { renderGate(d); footer.style.display = 'none'; }
        else { render(d); }
      })
      .catch(function(err){
        root.innerHTML = '<div class="state"><div style="font-family:var(--display);font-weight:800;font-size:20px;color:var(--ink);margin-bottom:8px">Report unavailable</div>' + esc(err.message) + '</div>';
      });
  }
  loadReport();

  /* ── Lead-capture gate ── */
  function renderGate(d){
    var name = d.company || d.domain || 'this builder';
    root.innerHTML =
      '<div class="card" style="max-width:480px;margin:8px auto 0">'
      + '<div class="hero-strip" style="text-align:center">'
      +   '<div class="eyebrow">BuilderAudit · trust report</div>'
      +   '<h1 style="font-size:23px">See ' + esc(name) + '\u2019s website trust audit</h1>'
      + '</div>'
      + '<div class="body">'
      +   '<p class="sub" style="color:var(--muted);margin:0 0 18px">Enter your details to view the full report — score, trust checks, strengths, the fixes that matter, and competitor comparison.</p>'
      +   '<div id="gateErr" style="display:none;font-family:var(--body);font-size:13px;color:var(--red);margin-bottom:12px"></div>'
      +   '<label class="gl">Your name</label><input id="gName" class="gi" type="text" autocomplete="name" placeholder="Jane Smith">'
      +   '<label class="gl">Email</label><input id="gEmail" class="gi" type="email" autocomplete="email" placeholder="jane@company.co.uk">'
      +   '<label class="gl">Company</label><input id="gCompany" class="gi" type="text" autocomplete="organization" placeholder="Smith & Co Builders">'
      +   '<button id="gSubmit" class="gbtn" type="button">View the report \u2192</button>'
      +   '<div style="font-family:var(--body);font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.45">Your details are shared with ' + esc(name) + ' (whose report this is) and BuilderAudit. We won\u2019t spam you.</div>'
      + '</div></div>';

    var btn = document.getElementById('gSubmit');
    var errBox = document.getElementById('gateErr');
    function showErr(m){ errBox.textContent = m; errBox.style.display = 'block'; }
    function submit(){
      var nm = (document.getElementById('gName').value||'').trim();
      var em = (document.getElementById('gEmail').value||'').trim();
      var co = (document.getElementById('gCompany').value||'').trim();
      if (!nm) return showErr('Please enter your name.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) return showErr('Please enter a valid email address.');
      if (!co) return showErr('Please enter your company name.');
      btn.disabled = true; btn.textContent = 'Loading\u2026';
      fetch('/api/share/' + encodeURIComponent(token) + '/lead', {
        method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
        body: JSON.stringify({ name:nm, email:em, company:co }),
      })
        .then(function(r){ return r.ok ? r.json() : r.json().then(function(e){ throw new Error(e.error||'Something went wrong'); }); })
        .then(function(){ loadReport(); })
        .catch(function(e){ btn.disabled = false; btn.textContent = 'View the report \u2192'; showErr(e.message); });
    }
    btn.addEventListener('click', submit);
    ['gName','gEmail','gCompany'].forEach(function(id){
      document.getElementById(id).addEventListener('keydown', function(e){ if (e.key==='Enter') submit(); });
    });
  }

  function render(d){
    document.title = (d.company || d.domain) + ' — Trust Audit · BuilderAudit';
    var sc = d.score || 0;
    var col = scoreColor(sc);
    var name = d.company || d.domain;

    /* Plain-English verdict band, spoken to the company */
    var band = sc>=75 ? 'Your website is doing its job — most homeowners will trust you on first look.'
             : sc>=55 ? 'Your website earns some trust, but clear gaps are costing you enquiries.'
             : 'Your website is losing you work — homeowners hit doubts before they ever call.';

    var s = d.snapshot || {};

    /* ── Hero ── */
    var hero =
      '<div class="card">'
      +  '<div class="hero-strip">'
      +    '<div class="eyebrow">Your website trust audit</div>'
      +    '<div class="hero-row">'
      +      '<div><h1>'+esc(name)+'</h1>'
      +        '<div class="meta">'+esc(d.domain)+(d.scannedAt?' · scanned '+fmtDate(d.scannedAt):'')+'</div></div>'
      +      '<div class="scorechip" style="background:'+col+'"><div class="n">'+sc+'</div><div class="l">/ 100 trust</div></div>'
      +    '</div>'
      +  '</div>'
      +  '<div class="body">'
      +    '<p class="sub"><b>'+esc(band)+'</b></p>'
      +    (d.headline ? '<p class="sub" style="color:var(--muted)">'+esc(d.headline)+'</p>' : '')
      +    (d.subtext ? '<p class="sub" style="color:var(--muted)">'+esc(d.subtext)+'</p>' : '')
      +    (d.fixesApplied>0 ? '<div class="meta" style="color:var(--green);font-weight:600">This score includes '+d.fixesApplied+' fix'+(d.fixesApplied>1?'es':'')+' you\'ve marked done (you started at '+d.baseScore+'). Re-scan to lock it in.</div>' : '')
      +  '</div>'
      +'</div>';

    /* ── AI voice intro (speaks directly to the owner) ── */
    var voice = d.voiceIntro
      ? '<div class="voice"><div class="lbl">What this means for you</div>'+esc(d.voiceIntro)+'</div>'
      : '';

    /* ── About your business ── */
    var kv = [];
    if (s.established)  kv.push(['Established', s.established]);
    if (s.yearsTrading) kv.push(['Trading', s.yearsTrading]);
    if (s.location)     kv.push(['Based in', s.location]);
    if (s.serviceArea)  kv.push(['Covers', s.serviceArea]);
    var snapshot = '';
    if (s.oneLiner || kv.length || (s.workTypes&&s.workTypes.length) || (s.accreditations&&s.accreditations.length) || (s.team&&s.team.length)) {
      snapshot = '<div class="card"><div class="body"><h2>About your business</h2>'
        + (s.oneLiner ? '<p class="sub" style="margin-bottom:16px">'+esc(s.oneLiner)+'</p>' : '')
        + (kv.length ? '<div class="kv">'+kv.map(function(p){ return '<div class="item"><div class="k">'+esc(p[0])+'</div><div class="v">'+esc(p[1])+'</div></div>'; }).join('')+'</div>' : '')
        + ((s.workTypes&&s.workTypes.length) ? '<div style="margin-top:16px"><div class="k" style="font-family:var(--body);font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:7px">What you do</div><div class="chips">'+s.workTypes.map(function(w){ return '<span class="chip">'+esc(w)+'</span>'; }).join('')+'</div></div>' : '')
        + ((s.accreditations&&s.accreditations.length) ? '<div style="margin-top:14px"><div class="k" style="font-family:var(--body);font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:7px">Accreditations found</div><div class="chips">'+s.accreditations.map(function(w){ return '<span class="chip">✓ '+esc(w)+'</span>'; }).join('')+'</div></div>' : '')
        + ((s.team&&s.team.length) ? '<div style="margin-top:14px"><div class="k" style="font-family:var(--body);font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:7px">Your team on the site</div><div class="chips">'+s.team.map(function(w){ return '<span class="chip">'+esc(w)+'</span>'; }).join('')+'</div></div>' : '')
        + '</div></div>';
    }

    /* ── Trust checks ── */
    var cats = (d.categories||[]).map(function(c){
      return '<div class="cat"><div class="nm">'+esc(c.name)+'</div>'
        + '<div class="bar"><div style="width:'+(c.score||0)+'%;background:'+scoreColor(c.score||0)+'"></div></div>'
        + '<div class="v">'+(c.score||0)+'</div></div>';
    }).join('');
    var catCard = cats ? '<div class="card"><div class="body"><h2>The 6 trust checks homeowners make</h2>'+cats+'</div></div>' : '';

    /* ── Strengths ── */
    var strengths = (d.strengths||[]).map(function(x){
      return '<li><span class="tick" style="color:var(--green)">✓</span><span>'+esc(x)+'</span></li>';
    }).join('');
    var strengthCard = strengths ? '<div class="card"><div class="body"><h2>What\'s working in your favour</h2><ul class="clean">'+strengths+'</ul></div></div>' : '';

    /* ── Trust breakpoints (where you lose them) ── */
    var bps = (d.breakpoints||[]).filter(function(b){ return b.title; }).map(function(b){
      return '<div class="bp"><div class="t">'+esc(b.title)+'</div>'
        + (b.reaction ? '<div class="r">"'+esc(b.reaction)+'"</div>' : '')
        + (b.fix ? '<div class="f"><b>Fix:</b> '+esc(b.fix)+'</div>' : '')
        + '</div>';
    }).join('');
    var bpCard = bps ? '<div class="card"><div class="body"><h2>Where you\'re losing homeowners</h2>'+bps+'</div></div>' : '';

    /* ── Photo verdict ── */
    var photoCard = d.photoSummary ? '<div class="card"><div class="body"><h2>Your photos</h2><p class="sub" style="color:var(--muted);margin:0">'+esc(d.photoSummary)+'</p></div></div>' : '';

    /* ── Priority fixes ── */
    var actions = (d.topActions||[]).map(function(a){
      return '<div class="action'+(a.done?' done':'')+'">'
        + '<span style="flex:0 0 auto;width:20px;height:20px;border-radius:5px;border:2.2px solid '+(a.done?'var(--green)':'var(--line)')+';background:'+(a.done?'var(--green)':'#fff')+';color:#fff;display:grid;place-items:center;font-weight:900;font-size:11px">'+(a.done?'✓':'')+'</span>'
        + '<div style="flex:1"><div class="ttl" style="'+(a.done?'text-decoration:line-through':'')+'">'+esc(a.title)+'</div>'
        +   (a.why ? '<div style="font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4">'+esc(a.why)+(a.time?' · '+esc(a.time):'')+'</div>' : '')
        + '</div>'
        + '<span class="imp">+'+(a.impact||0)+' pts</span></div>';
    }).join('');
    var actionCard = actions ? '<div class="card"><div class="body"><h2>Your priority fixes</h2><div style="display:flex;flex-direction:column;gap:9px">'+actions+'</div></div></div>' : '';

    /* ── Competitors (bottom) ── */
    var compCard = '';
    if (d.competitors && d.competitors.length) {
      var rank = d.ranking;
      var rankLine = rank
        ? '<p class="rankline">Against the '+rank.of+' competitor'+(rank.of>1?'s':'')+' you\'ve audited, you rank <b>#'+rank.position+' of '+rank.total+'</b> — you beat '+rank.beat+' of '+rank.of+', and the field averages '+rank.fieldAvg+' to your '+sc+'.</p>'
        : '';
      /* combined field incl. "you", sorted by score */
      var field = [{ name:name, url:d.domain, score:sc, you:true }]
        .concat(d.competitors.map(function(c){ return { name:c.name, url:c.url, score:c.score, you:false, verdict:c.verdict }; }))
        .sort(function(p,q){ return q.score - p.score; });
      var rows = field.map(function(f){
        return '<div class="comp'+(f.you?' you':'')+'">'
          + '<div><div class="nm">'+esc(f.name)+(f.you?' <span style="font-size:11px;color:var(--accent)">(you)</span>':'')+'</div>'
          +   (f.url ? '<div class="u">'+esc(f.url)+'</div>' : '')
          +   (f.verdict ? '<div class="u" style="margin-top:4px">'+esc(f.verdict)+'</div>' : '')
          + '</div>'
          + '<div class="sc" style="background:'+scoreColor(f.score)+';color:#fff">'+f.score+'</div>'
          + '</div>';
      }).join('');
      compCard = '<div class="card"><div class="body"><h2>How you compare to other builders</h2>'+rankLine+rows+'</div></div>';
    }

    root.innerHTML = hero + voice + snapshot + catCard + strengthCard + bpCard + photoCard + actionCard + compCard;
    footer.style.display = 'block';
  }
})();
</script>
<script src="/assets/feedback-widget.js" defer></script>
</body>
</html>
